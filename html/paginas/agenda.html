<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - Espaço Cre Bortoli</title>
    <link rel="icon" type="image/png" href="static/icon/favicon.ico">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <header class="header" role="banner">
        <div class="container header-container" style="display:flex;align-items:center;justify-content:space-between;width:100%;">
            <a href="index.html" class="header-title" aria-label="Página inicial - Espaço Cre Bortoli">
                <img src="static/css/image/crebortoli.png" alt="Espaço Cre Bortoli" style="height:44px;vertical-align:middle;margin-right:8px;border-radius:6px;"> Espaço Cre Bortoli
            </a>
            <button id="menu-toggle" class="sandwich-button" aria-label="Abrir menu" aria-expanded="false" aria-controls="main-navigation">
                <span class="sandwich-icon"></span>
            </button>
        </div>
        <nav id="main-navigation" class="main-nav" role="navigation" aria-label="Menu principal">
            <ul class="menu">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="servicos.html">Serviços</a></li>
                <li class="nav-item"><a class="nav-link" href="agenda.html">Agenda</a></li>
                <li class="nav-item"><a class="nav-link" href="sobre.html">Sobre</a></li>
                <li class="nav-item"><a class="nav-link" href="contato.html">Contato</a></li>
                <li class="nav-item"><a class="nav-link" href="sig/login.html">Intranet</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <div class="container">
            <h1>Agenda de Horários</h1>
            <p>Preencha o formulário abaixo para solicitar seu agendamento.</p>

            <div class="agenda-container">
                <div class="agenda-image">
                    <img src="static/css/image/hora.png" alt="Ilustração de um relógio e calendário">
                </div>

                <form id="agenda-form" class="agenda-form">
                    <div class="form-group">
                        <label for="nome" class="form-label">Nome Completo</label>
                        <input type="text" id="nome" name="nome" class="form-control" placeholder="Seu nome completo" required>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="seu.email@exemplo.com" required>
                    </div>

                    <div class="form-group">
                        <label for="telefone" class="form-label">Telefone</label>
                        <input type="tel" id="telefone" name="telefone" class="form-control" placeholder="(xx) xxxxx-xxxx" required>
                    </div>

                    <div class="form-group">
                        <label for="data" class="form-label">Data</label>
                        <input type="date" id="data" name="data" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="hora" class="form-label">Horário</label>
                        <input type="time" id="hora" name="hora" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="servico" class="form-label">Serviço</label>
                        <select id="servico" name="servico" class="form-control" required>
                            <option value="">Selecione um serviço</option>
                            <option value="Limpeza de Pele">Limpeza de Pele</option>
                            <option value="Depilação">Depilação</option>
                            <option value="Depilação Íntima">Depilação Íntima</option>
                            <option value="Drenagem Linfática">Drenagem Linfática</option>
                            <option value="Massagem Relaxante">Massagem Relaxante</option>
                            <option value="Manicure">Manicure</option>
                            <option value="Pedicure">Pedicure</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="observacoes" class="form-label">Observações</label>
                        <textarea id="observacoes" name="observacoes" class="form-control" rows="3" placeholder="Alguma informação adicional?"></textarea>
                    </div>

                    <div class="form-group">
                        <button type="submit" class="btn-submit">Agendar via WhatsApp</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Cre Bortoli. Todos os direitos reservados.</p>
        <div class="footer-social">
            <a href="https://www.instagram.com/crebortoli/?hl=pt" target="_blank" rel="noopener noreferrer">
                <img src="static/css/image/insta.png" alt="Instagram">
            </a>
            <a href="https://api.whatsapp.com/send?phone=5514996638056&text=Cre%20Bortoli" target="_blank" rel="noopener noreferrer">
                <img src="static/css/image/whats.png" alt="WhatsApp">
            </a>
        </div>
    </footer>

    <script src="static/js/contrast.js"></script>
    <script src="static/js/menu.js"></script>
    <script src="static/js/main.js"></script>
    <script>
        document.getElementById('agenda-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const telefone = document.getElementById('telefone').value;
            const data = document.getElementById('data').value;
            const hora = document.getElementById('hora').value;
            const servico = document.getElementById('servico').value;
            const observacoes = document.getElementById('observacoes').value;
            
            const mensagem = `Olá! Gostaria de agendar um horário:%0A%0A*Nome:* ${encodeURIComponent(nome)}%0A*Email:* ${encodeURIComponent(email)}%0A*Telefone:* ${encodeURIComponent(telefone)}%0A*Data:* ${encodeURIComponent(data)}%0A*Horário:* ${encodeURIComponent(hora)}%0A*Serviço:* ${encodeURIComponent(servico)}${observacoes ? '%0A*Observações:* ' + encodeURIComponent(observacoes) : ''}`;
            
            const url = `https://api.whatsapp.com/send?phone=5514996638056&text=${mensagem}`;
            window.open(url, '_blank');
        });
    </script>
</body>
</html>
