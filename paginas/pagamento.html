<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento PIX - Espaço Cre Bortoli</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <script>var v='1.0.0';document.write('<link rel="stylesheet" href="../static/css/style.css?v='+v+'">');document.write('<link rel="stylesheet" href="../static/css/paginas.css?v='+v+'">');</script>
    <style>
        .pagamento-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .pagamento-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .pagamento-header h1 {
            color: #e91e63;
            margin-bottom: 0.5rem;
        }
        .dados-pix {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            padding: 2rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .dados-pix h3 {
            color: #2e7d32;
            margin-top: 0;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .qr-code-container {
            background: white;
            border: 3px solid #4caf50;
            border-radius: 12px;
            padding: 1rem;
            display: inline-block;
            margin: 1rem 0;
        }
        #qr-code-pix {
            display: block;
        }
        .chave-pix {
            background: #e8f5e9;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }
        .chave-pix .label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 0.3rem;
        }
        .chave-pix .valor {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2e7d32;
            font-family: monospace;
            letter-spacing: 2px;
        }
        .btn-copiar {
            background: #4caf50;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 1rem;
        }
        .btn-copiar:hover {
            background: #388e3c;
        }
        .btn-copiar.copiado {
            background: #2e7d32;
        }
        .alert-importante {
            background: #fff3e0;
            border: 1px solid #ff9800;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
            text-align: left;
        }
        .alert-importante p {
            margin: 0;
            font-size: 0.9rem;
            color: #e65100;
        }
        .agendamentos-pendentes {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            padding: 1.5rem;
        }
        .agendamentos-pendentes h3 {
            color: #e65100;
            margin-top: 0;
            margin-bottom: 1rem;
        }
        .agendamento-item {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            background: #fff8e1;
        }
        .agendamento-item h4 {
            margin: 0 0 0.5rem 0;
            color: #333;
        }
        .agendamento-item .info {
            font-size: 0.9rem;
            color: #666;
            margin: 0.3rem 0;
        }
        .agendamento-item .valor {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2e7d32;
            margin-top: 0.5rem;
        }
        .btn-pagar {
            background: #4caf50;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 0.5rem;
            display: inline-block;
            text-decoration: none;
        }
        .btn-pagar:hover {
            background: #388e3c;
        }
        .btn-whatsapp {
            background: #25d366;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 0.5rem;
            display: inline-block;
            text-decoration: none;
            margin-left: 0.5rem;
        }
        .btn-whatsapp:hover {
            background: #128c7e;
        }
        .sem-agendamentos {
            text-align: center;
            padding: 2rem;
            color: #999;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="paginas-container">
            <div class="paginas-header">
                <h1>Pagamento via PIX</h1>
                <p>Escaneie o QR Code ou copie a chave para pagar</p>
            </div>

            <div class="dados-pix">
                <h3>&#10004; PIX - Chave Celular</h3>
                
                <div class="qr-code-container">
                    <div id="qr-code-pix"></div>
                </div>
                
                <div class="chave-pix">
                    <div class="label">Chave PIX (Celular)</div>
                    <div class="valor" id="chave-pix-display">(14) 99663-8056</div>
                </div>
                
                <button class="btn-copiar" id="btn-copiar" onclick="copiarChave()">
                    📋 Copiar Chave PIX
                </button>
                
                <div class="alert-importante">
                    <p><strong>&#9888; Importante:</strong><br>
                    Ao fazer o PIX, escreva <strong>seu nome completo</strong> na mensagem do pagamento para facilitar a identificação.</p>
                </div>
            </div>

            <div class="agendamentos-pendentes">
                <h3>Meus Agendamentos</h3>
                <div id="lista-agendamentos"></div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script>var v='1.0.0';document.write('<script src="../static/js/components.js?v='+v+'"><\/script>');document.write('<script src="../static/js/storage.js?v='+v+'"><\/script>');</script>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <script>
        const CHAVE_PIX = '14996638056';
        const TELEFONE_FORMATADO = '(14) 99663-8056';
        const WHATSAPP = '5514996638056';
        
        function gerarQRCodePIX() {
            const qr = new QRious({
                element: document.getElementById('qr-code-pix'),
                value: CHAVE_PIX,
                size: 200,
                background: 'white',
                foreground: '#2e7d32',
                level: 'M',
                padding: 10
            });
        }
        
        function copiarChave() {
            navigator.clipboard.writeText(CHAVE_PIX).then(() => {
                const btn = document.getElementById('btn-copiar');
                btn.textContent = '✓ Chave Copiada!';
                btn.classList.add('copiado');
                setTimeout(() => {
                    btn.textContent = '📋 Copiar Chave PIX';
                    btn.classList.remove('copiado');
                }, 2000);
            }).catch(() => {
                prompt('Copie a chave PIX:', CHAVE_PIX);
            });
        }

        function renderAgendamentos() {
            const agendamentos = AgendamentoStore.getAll()
                .filter(a => !a.pago && a.status !== 'CONCLUIDO')
                .sort((a, b) => new Date(a.data) - new Date(b.data));
            
            const container = document.getElementById('lista-agendamentos');
            
            if (agendamentos.length === 0) {
                container.innerHTML = '<div class="sem-agendamentos">Nenhum agendamento pendente de pagamento.</div>';
                return;
            }
            
            container.innerHTML = agendamentos.map(a => `
                <div class="agendamento-item">
                    <h4>${a.servicoNome}</h4>
                    <div class="info"><strong>Data:</strong> ${formatarData(a.data)}</div>
                    <div class="info"><strong>Cliente:</strong> ${a.cliente}</div>
                    <div class="valor">Total: R$ ${a.valor.toFixed(2).replace('.', ',')}</div>
                    <button class="btn-pagar" onclick="marcarPago('${a.id}')">✓ Confirmar Pagamento</button>
                    <a href="https://api.whatsapp.com/send?phone=${WHATSAPP}&text=Olá!%20Estou%20enviando%20o%20comprovante%20do%20agendamento%20de%20${encodeURIComponent(a.servicoNome)}%20no%20valor%20de%20R$%20${a.valor.toFixed(2).replace('.', ',')}" 
                       target="_blank"
                       class="btn-whatsapp">
                        📱 Enviar Comprovante
                    </a>
                </div>
            `).join('');
        }

        function formatarData(dataStr) {
            const data = new Date(dataStr + 'T00:00:00');
            return data.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        }

        function marcarPago(id) {
            if (confirm('Confirmar pagamento deste agendamento?')) {
                AgendamentoStore.update(id, { pago: true, status: 'PAGO' });
                renderAgendamentos();
                alert('Pagamento confirmado com sucesso!');
            }
        }

        gerarQRCodePIX();
        renderAgendamentos();
    </script>
</body>
</html>
