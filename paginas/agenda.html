<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - Espaço Cre Bortoli</title>
    <link rel="icon" type="image/png" href="/static/icon/favicon.ico">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="main-content">
        <div class="container">
            <h1>Agenda de Horários</h1>
            <p>Preencha o formulário abaixo para solicitar seu agendamento.</p>

            <div class="agenda-container">
                <div class="agenda-image">
                    <img src="/static/css/image/hora.png" alt="Ilustração de um relógio e calendário">
                </div>

                <form id="agenda-form" class="agenda-form">
                    <div class="form-group">
                        <label for="nome" class="form-label">Nome Completo</label>
                        <input type="text" id="nome" name="nome" class="form-control" placeholder="Seu nome completo" required>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="seu.email@exemplo.com" required>
                    </div>

                    <div class="form-group">
                        <label for="telefone" class="form-label">Telefone</label>
                        <input type="tel" id="telefone" name="telefone" placeholder="(xx) xxxxx-xxxx" required>
                    </div>

                    <div class="form-group">
                        <label for="data" class="form-label">Data</label>
                        <input type="date" id="data" name="data" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="hora" class="form-label">Horário</label>
                        <input type="time" id="hora" name="hora" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="servico" class="form-label">Serviço</label>
                        <select id="servico" name="servico" class="form-control" required>
                            <option value="">Selecione um serviço</option>
                            <option value="Limpeza de Pele">Limpeza de Pele</option>
                            <option value="Depilação">Depilação</option>
                            <option value="Depilação Íntima">Depilação Íntima</option>
                            <option value="Drenagem Linfática">Drenagem Linfática</option>
                            <option value="Massagem Relaxante">Massagem Relaxante</option>
                            <option value="Manicure">Manicure</option>
                            <option value="Pedicure">Pedicure</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="observacoes" class="form-label">Observações</label>
                        <textarea id="observacoes" name="observacoes" class="form-control" rows="3" placeholder="Alguma informação adicional?"></textarea>
                    </div>

                    <div class="form-group">
                        <button type="submit" class="btn-submit">Agendar via WhatsApp</button>
                    </div>
                </form>

                <div id="success-message" style="display:none; margin-top: 1rem; padding: 1rem; background: #d4edda; border-radius: 4px; text-align: center;">
                    <strong>Agendamento salvo!</strong> Você será redirecionado para o WhatsApp.
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
<script src="/static/js/storage.js"></script>
<script src="/static/js/components.js"></script>
<script>
document.getElementById('agenda-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = {
        nome: document.getElementById('nome').value,
        email: document.getElementById('email').value,
        telefone: document.getElementById('telefone').value,
        data: document.getElementById('data').value,
        hora: document.getElementById('hora').value,
        servico: document.getElementById('servico').value,
        observacoes: document.getElementById('observacoes').value
    };
    
    AgendamentoStore.save(formData);
    
    document.getElementById('agenda-form').style.display = 'none';
    document.getElementById('success-message').style.display = 'block';
    
    const mensagem = `Olá! Gostaria de agendar um horário.

*Nome:* ${formData.nome}
*Serviço:* ${formData.servico}
*Data:* ${formData.data}
*Horário:* ${formData.hora}
${formData.observacoes ? `*Observações:* ${formData.observacoes}` : ''}`;
    
    const whatsappUrl = `https://api.whatsapp.com/send?phone=5514996638056&text=${encodeURIComponent(mensagem)}`;
    
    setTimeout(() => {
        window.open(whatsappUrl, '_blank');
    }, 1500);
});
</script></body>
</html>
