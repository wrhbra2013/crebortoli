<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprovar Login - SIG Cre Bortoli</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <link rel="stylesheet" href="../static/css/style2.css">
    <style>
        :root {
            --cor-principal: #8a4baf;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f7f8fc 0%, #e8eaf6 100%);
            padding: 1rem;
        }
        .aprovar-container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(108, 99, 255, 0.15);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo h1 {
            color: var(--cor-principal);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .token-info {
            background: #e8eaf6;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }
        .token-info .label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 0.3rem;
        }
        .token-info .token {
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--cor-principal);
            letter-spacing: 2px;
        }
        .input-container {
            margin-bottom: 1.5rem;
        }
        .input-container label {
            display: block;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.5rem;
            text-align: left;
        }
        .input-container input {
            width: 100%;
            padding: 0.8rem;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            text-align: center;
            letter-spacing: 4px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-transform: uppercase;
            box-sizing: border-box;
        }
        .input-container input:focus {
            outline: none;
            border-color: var(--cor-principal);
        }
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 0.8rem;
            transition: all 0.3s;
        }
        .btn-aprovar {
            background: #28a745;
            color: white;
        }
        .btn-aprovar:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
        }
        .btn-negar {
            background: #dc3545;
            color: white;
        }
        .btn-negar:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
        }
        .status-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: 500;
        }
        .status-message.sucesso {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        .status-message.erro {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        .status-message.info {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
        }
        .info-text {
            font-size: 0.85rem;
            color: #666;
            margin-top: 1rem;
        }
        .timer {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .timer span {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--cor-principal);
        }
        .timer.expirando {
            color: #dc3545;
        }
        .timer.expirando span {
            color: #dc3545;
        }
        .expired-message {
            display: none;
            padding: 1rem;
            background: #f8d7da;
            border-radius: 8px;
            color: #721c24;
            margin-bottom: 1rem;
        }
        .back-link {
            margin-top: 1.5rem;
        }
        .back-link a {
            color: var(--cor-principal);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        h2 {
            color: var(--cor-principal);
            margin-bottom: 0.5rem;
        }
        p {
            color: #666;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="aprovar-container">
        <div class="logo">
            <h1>SIG Cre Bortoli</h1>
        </div>
        
        <div id="status-message" class="status-message" style="display: none;"></div>
        
        <div class="icon" id="icon">🔐</div>
        
        <h2 id="titulo">Aprovar Acesso</h2>
        <p id="subtitulo">Alguém está tentando acessar o sistema SIG</p>
        
        <div class="token-info">
            <div class="label">Código da sessão</div>
            <div class="token" id="token-display">-</div>
        </div>
        
        <div class="timer" id="timer">
            ⏱️ Expira em: <span id="countdown">30</span>s
        </div>
        
        <div class="expired-message" id="expired-message">
            ⚠️ Tempo expirado! Solicite um novo QR Code no computador.
        </div>
        
        <p class="info-text">
            Digite o código no dispositivo principal para confirmar o acesso.
        </p>
        
        <div class="back-link">
            <a href="../index.html">← Voltar ao site</a>
        </div>
    </div>

    <script>
        const SESSION_KEY = 'sig_qr_session';
        const SESSION_TIMEOUT = 30;

        function getBaseUrl() {
            const path = window.location.pathname;
            const basePath = path.substring(0, path.lastIndexOf('/sig/'));
            return window.location.origin + basePath;
        }

        async function syncToServer(acao, token) {
            try {
                const response = await fetch(getBaseUrl() + '/api_session.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ acao, token })
                });
                return await response.json();
            } catch (e) {
                return null;
            }
        }

        let tokenUrl = '';
        let countdown = 30;
        let countdownInterval = null;
        let verificarInterval = null;

        function startCountdown() {
            countdown = SESSION_TIMEOUT;
            const countdownEl = document.getElementById('countdown');
            const timerEl = document.getElementById('timer');
            
            countdownInterval = setInterval(() => {
                countdown--;
                countdownEl.textContent = countdown;
                
                if (countdown <= 10) {
                    timerEl.classList.add('expirando');
                }
                
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    showExpired();
                }
            }, 1000);
        }

        function showExpired() {
            clearInterval(verificarInterval);
            document.getElementById('timer').style.display = 'none';
            document.getElementById('expired-message').style.display = 'block';
            document.getElementById('btn-aprovar').style.display = 'none';
            document.getElementById('btn-negar').style.display = 'none';
            document.getElementById('icon').textContent = '⏰';
            document.getElementById('titulo').textContent = 'Expirado';
            document.getElementById('subtitulo').textContent = 'O tempo para aprovar expirou.';
            document.querySelector('.info-text').style.display = 'none';
        }

        function loadSession() {
            const stored = localStorage.getItem(SESSION_KEY);
            if (stored) {
                return JSON.parse(stored);
            }
            return null;
        }

        function saveSession(sessionData) {
            localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));
        }

        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            tokenUrl = urlParams.get('token') || '';

            if (!tokenUrl) {
                mostrarStatus('Link inválido. Escaneie o QR Code novamente.', 'erro');
                document.getElementById('btn-aprovar').style.display = 'none';
                document.getElementById('btn-negar').style.display = 'none';
                document.getElementById('icon').textContent = '❌';
                return;
            }

            const sessionData = loadSession();
            if (sessionData && sessionData.token === tokenUrl && sessionData.status === 'aprovado') {
                mostrarStatus('Este login já foi aprovado!', 'sucesso');
                document.getElementById('btn-aprovar').style.display = 'none';
                document.getElementById('btn-negar').style.display = 'none';
                document.getElementById('icon').textContent = '✓';
                document.getElementById('titulo').textContent = 'Aprovado!';
                document.getElementById('subtitulo').textContent = 'Acesso liberado no computador.';
                return;
            }

            document.getElementById('token-display').textContent = tokenUrl;
            startCountdown();
            verificarStatus(tokenUrl);
        }

        async function verificarStatus(token) {
            const sessionData = loadSession();
            
            if (sessionData && sessionData.token === token) {
                const age = (Date.now() - sessionData.criadoEm) / 1000;
                if (age >= SESSION_TIMEOUT) {
                    showExpired();
                    return;
                }

                if (sessionData.status === 'aprovado') {
                    clearInterval(countdownInterval);
                    clearInterval(verificarInterval);
                    mostrarStatus('Aprovado!', 'sucesso');
                    document.getElementById('btn-aprovar').style.display = 'none';
                    document.getElementById('btn-negar').style.display = 'none';
                    document.getElementById('timer').style.display = 'none';
                    document.getElementById('icon').textContent = '✓';
                    document.getElementById('titulo').textContent = 'Aprovado!';
                    document.getElementById('subtitulo').textContent = 'Acesso liberado no computador.';
                    return;
                }

                if (sessionData.status === 'negado') {
                    clearInterval(countdownInterval);
                    clearInterval(verificarInterval);
                    mostrarStatus('Login negado.', 'info');
                    document.getElementById('btn-aprovar').style.display = 'none';
                    document.getElementById('btn-negar').style.display = 'none';
                    document.getElementById('timer').style.display = 'none';
                    return;
                }
            }

            const serverResult = await syncToServer('verificar', token);
            if (serverResult) {
                if (serverResult.status === 'aprovado') {
                    clearInterval(countdownInterval);
                    clearInterval(verificarInterval);
                    if (sessionData) {
                        sessionData.status = 'aprovado';
                        saveSession(sessionData);
                    }
                    mostrarStatus('Aprovado!', 'sucesso');
                    document.getElementById('btn-aprovar').style.display = 'none';
                    document.getElementById('btn-negar').style.display = 'none';
                    document.getElementById('timer').style.display = 'none';
                    document.getElementById('icon').textContent = '✓';
                    document.getElementById('titulo').textContent = 'Aprovado!';
                    document.getElementById('subtitulo').textContent = 'Acesso liberado no computador.';
                    return;
                }
                if (serverResult.status === 'nao_encontrada' || serverResult.status === 'expirada') {
                    showExpired();
                    return;
                }
            }

            verificarInterval = setTimeout(() => verificarStatus(token), 2000);
        }

        async function approveLogin() {
            const btn = document.getElementById('btn-aprovar');
            btn.disabled = true;
            btn.textContent = 'Confirmando...';

            const sessionData = loadSession();
            if (sessionData && sessionData.token === tokenUrl) {
                sessionData.status = 'aprovado';
                sessionData.aprovadoEm = Date.now();
                saveSession(sessionData);
            }

            await syncToServer('aprovar', tokenUrl);

            clearInterval(countdownInterval);
            clearInterval(verificarInterval);
            
            mostrarStatus('Aprovado!', 'sucesso');
            document.getElementById('btn-aprovar').style.display = 'none';
            document.getElementById('btn-negar').style.display = 'none';
            document.getElementById('timer').style.display = 'none';
            document.getElementById('icon').textContent = '✓';
            document.getElementById('titulo').textContent = 'Confirmado!';
            document.getElementById('subtitulo').textContent = 'Acesso liberado no computador.';
        }

        async function negarLogin() {
            clearInterval(countdownInterval);
            clearInterval(verificarInterval);

            const sessionData = loadSession();
            if (sessionData && sessionData.token === tokenUrl) {
                sessionData.status = 'negado';
                sessionData.negadoEm = Date.now();
                saveSession(sessionData);
            }

            await syncToServer('negar', tokenUrl);

            mostrarStatus('Cancelado.', 'info');
            document.getElementById('btn-aprovar').style.display = 'none';
            document.getElementById('btn-negar').style.display = 'none';
            document.getElementById('timer').style.display = 'none';
            document.getElementById('icon').textContent = '✕';
            document.getElementById('titulo').textContent = 'Cancelado';
            document.getElementById('subtitulo').textContent = 'O login foi cancelado.';
        }

        function mostrarStatus(mensagem, tipo) {
            const el = document.getElementById('status-message');
            el.textContent = mensagem;
            el.className = 'status-message ' + tipo;
            el.style.display = mensagem ? 'block' : 'none';
        }

        init();
    </script>
</body>
</html>
