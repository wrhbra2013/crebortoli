<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprovar Login - SIG Cre Bortoli</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <link rel="stylesheet" href="../static/css/style2.css">
    <style>
        :root {
            --cor-principal: #8a4baf;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f7f8fc 0%, #e8eaf6 100%);
            padding: 1rem;
        }
        .aprovar-container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(108, 99, 255, 0.15);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo h1 {
            color: var(--cor-principal);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .token-info {
            background: #e8eaf6;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }
        .token-info .label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 0.3rem;
        }
        .token-info .token {
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--cor-principal);
            letter-spacing: 2px;
        }
        .input-container {
            margin-bottom: 1.5rem;
        }
        .input-container label {
            display: block;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.5rem;
            text-align: left;
        }
        .input-container input {
            width: 100%;
            padding: 0.8rem;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            text-align: center;
            letter-spacing: 4px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-transform: uppercase;
            box-sizing: border-box;
        }
        .input-container input:focus {
            outline: none;
            border-color: var(--cor-principal);
        }
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 0.8rem;
            transition: all 0.3s;
        }
        .btn-aprovar {
            background: #28a745;
            color: white;
        }
        .btn-aprovar:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
        }
        .btn-negar {
            background: #dc3545;
            color: white;
        }
        .btn-negar:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
        }
        .status-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: 500;
        }
        .status-message.sucesso {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        .status-message.erro {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        .status-message.info {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
        }
        .info-text {
            font-size: 0.85rem;
            color: #666;
            margin-top: 1rem;
        }
        .back-link {
            margin-top: 1.5rem;
        }
        .back-link a {
            color: var(--cor-principal);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        h2 {
            color: var(--cor-principal);
            margin-bottom: 0.5rem;
        }
        p {
            color: #666;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="aprovar-container">
        <div class="logo">
            <h1>SIG Cre Bortoli</h1>
        </div>
        
        <div id="status-message" class="status-message" style="display: none;"></div>
        
        <div class="icon" id="icon">🔐</div>
        
        <h2 id="titulo">Aprovar Acesso</h2>
        <p id="subtitulo">Alguém está tentando acessar o sistema SIG</p>
        
        <div class="token-info">
            <div class="label">Código da sessão</div>
            <div class="token" id="token-display">-</div>
        </div>
        
        <div class="input-container" id="input-container">
            <label for="codigo-digitado">Digite o código acima para confirmar:</label>
            <input type="text" id="codigo-digitado" maxlength="8" placeholder="________" autocomplete="off">
        </div>
        
        <button class="btn btn-aprovar" id="btn-aprovar" onclick="aprovarLogin()">
            ✓ Aprovar Login
        </button>
        
        <button class="btn btn-negar" id="btn-negar" onclick="negarLogin()">
            ✕ Negar
        </button>
        
        <p class="info-text">
            Ao aprovar, o acesso ao sistema será liberado no computador.
        </p>
        
        <div class="back-link">
            <a href="../index.html">← Voltar ao site</a>
        </div>
    </div>

    <script>
        function getBaseUrl() {
            const path = window.location.pathname;
            const basePath = path.substring(0, path.lastIndexOf('/sig/'));
            return window.location.origin + basePath;
        }

        async function apiSession(acao, dados = {}) {
            const response = await fetch(getBaseUrl() + '/api_session.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ acao, ...dados })
            });
            return response.json();
        }

        let tokenUrl = '';

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            tokenUrl = urlParams.get('token') || '';

            if (!tokenUrl) {
                mostrarStatus('Link inválido. Escaneie o QR Code novamente.', 'erro');
                document.getElementById('btn-aprovar').style.display = 'none';
                document.getElementById('btn-negar').style.display = 'none';
                document.getElementById('input-container').style.display = 'none';
                document.getElementById('icon').textContent = '❌';
                return;
            }

            document.getElementById('token-display').textContent = tokenUrl;
            document.getElementById('codigo-digitado').focus();
            verificarStatus(tokenUrl);
        }

        async function verificarStatus(token) {
            try {
                const result = await apiSession('verificar', { token });

                if (result.status === 'nao_encontrada') {
                    mostrarStatus('Sessão não encontrada. Solicite um novo QR Code.', 'erro');
                    document.getElementById('btn-aprovar').style.display = 'none';
                    document.getElementById('btn-negar').style.display = 'none';
                    document.getElementById('input-container').style.display = 'none';
                    return;
                }

                if (result.status === 'aprovado') {
                    mostrarStatus('Este login já foi aprovado!', 'sucesso');
                    document.getElementById('btn-aprovar').style.display = 'none';
                    document.getElementById('btn-negar').style.display = 'none';
                    document.getElementById('input-container').style.display = 'none';
                    document.getElementById('icon').textContent = '✓';
                    document.getElementById('titulo').textContent = 'Aprovado!';
                    document.getElementById('subtitulo').textContent = 'Você pode fechar esta página.';
                    return;
                }

                if (result.status === 'negado') {
                    mostrarStatus('Este login foi negado. Solicite um novo QR Code.', 'info');
                    document.getElementById('btn-aprovar').style.display = 'none';
                    document.getElementById('btn-negar').style.display = 'none';
                    document.getElementById('input-container').style.display = 'none';
                    return;
                }
            } catch (e) {
                console.error('Erro:', e);
            }

            setTimeout(() => verificarStatus(token), 2000);
        }

        function validarCodigo() {
            const digitado = document.getElementById('codigo-digitado').value.toUpperCase().trim();
            return digitado === tokenUrl;
        }

        async function approveLogin() {
            if (!validarCodigo()) {
                mostrarStatus('Código incorreto. Digite exatamente o código exibido acima.', 'erro');
                document.getElementById('codigo-digitado').value = '';
                document.getElementById('codigo-digitado').focus();
                return;
            }

            const btn = document.getElementById('btn-aprovar');
            btn.disabled = true;
            btn.textContent = 'Confirmando...';

            try {
                const result = await apiSession('aprovar', { token: tokenUrl });
                if (result.sucesso) {
                    mostrarStatus('Login confirmado!', 'sucesso');
                    document.getElementById('btn-aprovar').style.display = 'none';
                    document.getElementById('btn-negar').style.display = 'none';
                    document.getElementById('input-container').style.display = 'none';
                    document.getElementById('icon').textContent = '✓';
                    document.getElementById('titulo').textContent = 'Confirmado!';
                    document.getElementById('subtitulo').textContent = 'O acesso foi liberado no computador.';
                } else {
                    btn.disabled = false;
                    btn.textContent = '✓ Aprovar Login';
                    mostrarStatus('Erro ao confirmar. Tente novamente.', 'erro');
                }
            } catch (e) {
                btn.disabled = false;
                btn.textContent = '✓ Aprovar Login';
                mostrarStatus('Erro de conexão.', 'erro');
            }
        }

        async function negarLogin() {
            if (tokenUrl) {
                try {
                    await apiSession('negar', { token: tokenUrl });
                } catch (e) {
                    console.error('Erro:', e);
                }
            }

            mostrarStatus('Login cancelado.', 'info');
            document.getElementById('btn-aprovar').style.display = 'none';
            document.getElementById('btn-negar').style.display = 'none';
            document.getElementById('input-container').style.display = 'none';
            document.getElementById('icon').textContent = '✕';
            document.getElementById('titulo').textContent = 'Cancelado';
            document.getElementById('subtitulo').textContent = 'O login foi cancelado.';
        }

        function mostrarStatus(mensagem, tipo) {
            const el = document.getElementById('status-message');
            el.textContent = mensagem;
            el.className = 'status-message ' + tipo;
            el.style.display = 'block';
        }

        document.getElementById('codigo-digitado').addEventListener('input', function(e) {
            this.value = this.value.toUpperCase();
            mostrarStatus('', '');
        });

        document.getElementById('codigo-digitado').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                aprobarLogin();
            }
        });

        init();
    </script>
</body>
</html>
