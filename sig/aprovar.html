<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprovar Login - SIG Cre Bortoli</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <link rel="stylesheet" href="../static/css/style2.css">
    <style>
        :root {
            --cor-principal: #8a4baf;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f7f8fc 0%, #e8eaf6 100%);
            padding: 1rem;
        }
        .approval-container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(108, 99, 255, 0.15);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 {
            color: var(--cor-principal);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #666;
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }
        .code-display {
            background: #e8eaf6;
            padding: 1rem;
            border-radius: 8px;
            margin: 1.5rem 0;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 0.3rem;
            color: var(--cor-principal);
            word-break: break-all;
        }
        .input-container {
            margin: 1.5rem 0;
        }
        .input-container label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .input-container input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1.2rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
        }
        .input-container input:focus {
            outline: none;
            border-color: var(--cor-principal);
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .btn-primary {
            flex: 1;
            padding: 1rem;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary:hover {
            background: #218838;
        }
        .btn-danger {
            flex: 1;
            padding: 1rem;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-danger:hover {
            background: #c82333;
        }
        .status-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: 500;
            display: none;
        }
        .status-message.sucesso {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
            display: block;
        }
        .status-message.erro {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
            display: block;
        }
        .status-message.info {
            background: #cce5ff;
            color: #004085;
            border-left: 4px solid #007bff;
            display: block;
        }
    </style>
</head>
<body>
    <div class="approval-container">
        <div class="icon" id="icon">🔐</div>
        <h1 id="titulo">Aprovar Login</h1>
        <p class="subtitle" id="subtitulo">Digite o código exibido no computador para confirmar o acesso.</p>
        
        <div id="approval-result"></div>
        
        <div class="code-display" id="codigo-lido"></div>
        
        <div id="input-container" class="input-container">
            <label for="codigo-digitado">Digite o código:</label>
            <input type="text" id="codigo-digitado" placeholder="XXXXXXXX" maxlength="8" autocomplete="off">
        </div>
        
        <div class="btn-group" id="btn-group">
            <button class="btn-primary" id="btn-confirmar" onclick="confirmarLogin()">✓ Confirmar Login</button>
            <button class="btn-danger" id="btn-cancelar" onclick="cancelarLogin()">✕ Cancelar</button>
        </div>
        
        <p class="info-text" style="margin-top: 1.5rem; font-size: 0.9rem; color: #666;">
            O código deve ser digitado manualmente para confirmar o acesso.
        </p>
    </div>

    <script type="module">
        import PocketBase from 'https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.4/pocketbase.es.mjs';
        import { qr_sessoes } from '../static/js/pb-db.js';
        
        const pb = new PocketBase('https://www.crebortoli.com.br');
        
        let codigoLido = '';

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            codigoLido = urlParams.get('token') || '';

            if (!codigoLido) {
                mostrarStatus('Link inválido. Gere um novo código no computador.', 'erro');
                document.getElementById('btn-confirmar').style.display = 'none';
                document.getElementById('btn-cancelar').style.display = 'none';
                document.getElementById('input-container').style.display = 'none';
                document.getElementById('icon').textContent = '❌';
                return;
            }

            document.getElementById('codigo-lido').textContent = codigoLido;
            document.getElementById('codigo-digitado').focus();
        }

        function mostrarStatus(mensagem, tipo) {
            const el = document.getElementById('approval-result');
            el.innerHTML = `<div class="status-message ${tipo}">${mensagem}</div>`;
        }

        function validarCodigo() {
            const digitado = document.getElementById('codigo-digitado').value.toUpperCase().trim();
            return digitado === codigoLido;
        }

        async function confirmarLogin() {
            if (!validarCodigo()) {
                mostrarStatus('Código incorreto. Digite exatamente o código exibido acima.', 'erro');
                document.getElementById('codigo-digitado').value = '';
                document.getElementById('codigo-digitado').focus();
                return;
            }

            const btn = document.getElementById('btn-confirmar');
            btn.disabled = true;
            btn.textContent = 'Confirmando...';

            try {
                const result = await qr_sessoes.aprobar(codigoLido);
                
                if (result) {
                    mostrarStatus('Login confirmado!', 'sucesso');
                    document.getElementById('btn-confirmar').style.display = 'none';
                    document.getElementById('btn-cancelar').style.display = 'none';
                    document.getElementById('input-container').style.display = 'none';
                    document.getElementById('icon').textContent = '✓';
                    document.getElementById('titulo').textContent = 'Confirmado!';
                    document.getElementById('subtitulo').textContent = 'O acesso foi liberado no computador.';
                } else {
                    throw new Error('Erro ao confirmar');
                }
            } catch (e) {
                mostrarStatus(e.message || 'Erro ao confirmar. Tente novamente.', 'erro');
                btn.disabled = false;
                btn.textContent = '✓ Confirmar Login';
            }
        }

        async function cancelarLogin() {
            const btn = document.getElementById('btn-cancelar');
            btn.disabled = true;
            btn.textContent = 'Cancelando...';

            try {
                await qr_sessoes.negar(codigoLido);
            } catch (e) {
                console.error('Erro ao cancelar:', e);
            }

            mostrarStatus('Login cancelado.', 'info');
            document.getElementById('btn-confirmar').style.display = 'none';
            document.getElementById('btn-cancelar').style.display = 'none';
            document.getElementById('input-container').style.display = 'none';
            document.getElementById('icon').textContent = '✕';
            document.getElementById('titulo').textContent = 'Cancelado';
            document.getElementById('subtitulo').textContent = 'O login foi cancelado.';
        }

        document.getElementById('codigo-digitado').addEventListener('input', function() {
            this.value = this.value.toUpperCase();
            mostrarStatus('', '');
        });

        document.getElementById('codigo-digitado').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                confirmarLogin();
            }
        });

        init();
    </script>
</body>
</html>
