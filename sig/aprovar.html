<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprovar Login - Cre Bortoli</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f7f8fc 0%, #e8eaf6 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 1rem;
        }
        .modal {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .code-display {
            background: #e8eaf6;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 0.3rem;
            color: #8a4baf;
            word-break: break-all;
        }
        .timer { color: #666; font-size: 0.9rem; margin-top: 1rem; }
        .timer .countdown { font-weight: bold; color: #8a4baf; }
    </style>
</head>
<body>
    <div class="modal">
        <div class="code-display" id="codigo-lido"></div>
        <div class="timer">Expira em: <span class="countdown" id="countdown">60</span>s</div>
    </div>

    <script>
        let codigoLido = '';
        let countdownInterval = null;
        let remainingTime = 60;
        const SESSION_KEY = 'sig_qr_session';
        
        function startTimer() {
            const countdownEl = document.getElementById('countdown');
            countdownEl.textContent = remainingTime;
            
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                remainingTime--;
                countdownEl.textContent = remainingTime;
                
                if (remainingTime <= 0) {
                    clearInterval(countdownInterval);
                }
            }, 1000);
        }
        
        function setSessionStatus(status) {
            const sessionData = {
                token: codigoLido,
                status: status,
                created: Date.now()
            };
            localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));
        }
        
        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            codigoLido = urlParams.get('token') || '';
            
            if (!codigoLido) {
                document.getElementById('codigo-lido').textContent = 'Link inválido';
                return;
            }
            
            document.getElementById('codigo-lido').textContent = codigoLido;
            setSessionStatus('aprovado');
            startTimer();
        }
        
        init();
    </script>
</body>
</html>
