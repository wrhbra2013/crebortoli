<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprovar Login - Cre Bortoli</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <link rel="stylesheet" href="../static/css/style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f7f8fc 0%, #e8eaf6 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 1rem;
        }
        .modal {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            font-size: 1.2rem;
        }
        .token-label {
            font-size: 1rem;
            color: #666;
            margin-bottom: 0.5rem;
        }
        .token-display {
            font-size: 1.5rem;
            font-weight: bold;
            color: #8a4baf;
            margin-bottom: 1rem;
            word-break: break-all;
        }
        .timer { color: #666; font-size: 1rem; margin-top: 1rem; }
        .timer .countdown { font-weight: bold; color: #8a4baf; }
    </style>
</head>
<body>
    <div class="modal">
        <div class="token-label">Token de aprovação:</div>
        <div id="codigo-lido"></div>
        <div class="timer">Expira em: <span class="countdown" id="countdown">60</span>s</div>
    </div>

    <script src="../static/js/storage.js"></script>
    <script>
        let codigoLido = '';
        let countdownInterval = null;
        let remainingTime = 60;

        async function updateSessionStatus(token, status) {
            try {
                const result = await fetch('/api/update?action=update&table=sessoes&project=' + API_CONFIG.project + '&id=' + encodeURIComponent(token), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_CONFIG.token}`
                    },
                    body: JSON.stringify({
                        data: { status: status }
                    })
                });
                return await result.json();
            } catch (e) {
                console.warn('API update session failed, using localStorage fallback:', e);
                localStorage.setItem('sig_qr_session', JSON.stringify({ token, status: 'aprovado', created: Date.now() }));
                return null;
            }
        }

        function startTimer() {
            const countdownEl = document.getElementById('countdown');
            countdownEl.textContent = remainingTime;

            if (countdownInterval) clearInterval(countdownInterval);

            countdownInterval = setInterval(() => {
                remainingTime--;
                countdownEl.textContent = remainingTime;

                if (remainingTime <= 0) {
                    clearInterval(countdownInterval);
                }
            }, 1000);
        }

        async function init() {
            const hash = window.location.hash.substring(1);
            const urlParams = new URLSearchParams(hash);
            codigoLido = urlParams.get('token') || '';

            if (!codigoLido) {
                document.getElementById('codigo-lido').textContent = 'Link inválido';
                return;
            }

            document.getElementById('codigo-lido').textContent = codigoLido;
            await updateSessionStatus(codigoLido, 'aprovado');
            startTimer();
        }

        init();
    </script>
</body>
</html>
