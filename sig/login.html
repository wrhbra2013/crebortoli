<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login SIG - Cre Bortoli</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <link rel="stylesheet" href="../static/css/style2.css">
    <style>
        :root { --cor-principal: #8a4baf; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f7f8fc 0%, #e8eaf6 100%);
            padding: 1rem;
        }
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(108, 99, 255, 0.15);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo h1 { color: var(--cor-principal); font-size: 2rem; margin-bottom: 0.5rem; }
        .logo p { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .qr-container { background: #f8f9fa; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .celular-icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .qr-code { display: flex; justify-content: center; align-items: center; min-height: 200px; }
        .status-message {
            padding: 1rem; border-radius: 8px; margin-bottom: 1rem;
            font-weight: 500; display: none;
        }
        .status-message.aprovado { background: #d4edda; color: #155724; border-left: 4px solid #28a745; display: block; }
        .status-message.negado { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; display: block; }
        .instructions { background: #e8eaf6; border-radius: 10px; padding: 1rem; margin-bottom: 1.5rem; text-align: left; font-size: 0.9rem; }
        .instructions h3 { font-size: 1rem; color: var(--cor-principal); margin-bottom: 0.5rem; }
        .instructions ol { margin: 0; padding-left: 1.2rem; }
        .instructions li { margin-bottom: 0.3rem; }
        .btn-whatsapp {
            width: 100%; padding: 1rem; background: #25d366; color: white;
            border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer;
            margin-top: 0.5rem; display: none;
        }
        .btn-whatsapp:hover { background: #20bd5c; }
        .btn-primary {
            width: 100%; padding: 1rem; background: var(--cor-principal); color: white;
            border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer;
        }
        .btn-primary:hover { background: #7a3bb0; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .timer { display: none; color: #666; font-size: 0.9rem; margin-top: 0.5rem; }
        .countdown { font-weight: bold; color: var(--cor-principal); }
        .input-code-container { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #e0e0e0; }
        .input-code-container label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: #666; }
        .input-code-container input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1.2rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            box-sizing: border-box;
        }
        .input-code-container input:focus { outline: none; border-color: var(--cor-principal); }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Painel Admin</h1>
            <p>Espaço Cre Bortoli</p>
        </div>
        <div id="status-message" class="status-message"></div>
        <div class="qr-container">
            <div class="celular-icon">📱</div>
            <div id="qr-code" class="qr-code">
                <p style="color: #999;">Clique em "Gerar QR Code" para iniciar</p>
            </div>
        </div>
        <div id="timer" class="timer">Expira em: <span class="countdown" id="countdown">60</span>s</div>
        <div class="input-code-container" id="input-code-container" style="display: none;">
            <label for="codigo-manual">Ou digite o código aqui:</label>
            <input type="text" id="codigo-manual" placeholder="XXXXXXXX" maxlength="8" autocomplete="off">
        </div>
        <button class="btn-primary" id="btn-gerar" onclick="gerarQR()">Gerar QR Code</button>
        <button class="btn-whatsapp" id="btn-whatsapp" onclick="compartilharQR()">📱 Compartilhar Código</button>
    </div>

    <script>
        const SESSION_KEY = 'sig_qr_session';
        const AUTH_KEY = 'sig_authenticated';
        const SESSION_TIMEOUT = 60;
        
        let currentToken = '';
        let countdownInterval = null;
        let pollTimeout = null;
        let remainingTime = SESSION_TIMEOUT;
        
        const BASE_URL = window.location.origin;
        
        function getBaseUrl() {
            return BASE_URL;
        }
        
        function showStatus(msg, type) {
            const el = document.getElementById('status-message');
            el.textContent = msg;
            el.className = 'status-message ' + type;
            el.style.display = 'block';
        }
        
        function hideStatus() {
            document.getElementById('status-message').style.display = 'none';
        }
        
        function gerarToken() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let token = '';
            for (let i = 0; i < 8; i++) {
                token += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return token;
        }
        
        function displayToken(token) {
            const container = document.getElementById('qr-code');
            container.innerHTML = '';
            const qrUrl = getBaseUrl() + '/sig/aprovar.html?token=' + token;
            new QRCode(container, {
                text: qrUrl,
                width: 180,
                height: 180,
                colorDark: '#8a4baf',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }
        
        function saveSessionLocal(sessionData) {
            localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));
        }
        
        function clearSessionLocal() {
            localStorage.removeItem(SESSION_KEY);
        }
        
        function loadSessionLocal() {
            const stored = localStorage.getItem(SESSION_KEY);
            return stored ? JSON.parse(stored) : null;
        }
        
        function startTimer() {
            let countdown = remainingTime;
            const countdownEl = document.getElementById('countdown');
            const timerEl = document.getElementById('timer');
            
            timerEl.style.display = 'block';
            countdownEl.textContent = countdown;
            
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                countdown--;
                remainingTime = countdown;
                countdownEl.textContent = countdown;
                
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    stopPolling();
                    clearSessionLocal();
                    timerEl.style.display = 'none';
                    showStatus('Sessão expirada. Gere um novo código.', 'negado');
                }
            }, 1000);
        }
        
        function stopTimer() {
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            document.getElementById('timer').style.display = 'none';
        }
        
        function stopPolling() {
            if (pollTimeout) {
                clearTimeout(pollTimeout);
                pollTimeout = null;
            }
        }
        
        function gerarQR() {
            const btn = document.getElementById('btn-gerar');
            btn.disabled = true;
            btn.textContent = 'Gerando...';
            hideStatus();
            stopPolling();
            stopTimer();
            remainingTime = SESSION_TIMEOUT;
            
            currentToken = gerarToken();
            
            const sessionData = {
                token: currentToken,
                status: 'gerado',
                created: Date.now()
            };
            saveSessionLocal(sessionData);
            
            displayToken(currentToken);
            
            document.getElementById('input-code-container').style.display = 'block';
            document.getElementById('codigo-manual').value = '';
            document.getElementById('codigo-manual').focus();
            
            const btnWhatsapp = document.getElementById('btn-whatsapp');
            btnWhatsapp.style.display = 'block';
            btnWhatsapp.textContent = '📱 Compartilhar link de aprovação';
            
            btn.disabled = false;
            btn.textContent = 'Gerar Novo Código';
            
            startTimer();
            startPollingLocal();
        }
        
        function compartilharQR() {
            if (!currentToken) return;
            
            const url = getBaseUrl() + '/sig/aprovar.html?token=' + currentToken;
            const mensagem = 'Acesse para aprovar o login: ' + url;
            const whatsappUrl = 'https://wa.me/?text=' + encodeURIComponent(mensagem);
            window.open(whatsappUrl, '_blank');
        }
        
        function secureLogin() {
            localStorage.setItem('sig_authenticated', 'true');
            localStorage.setItem('sig_auth_time', Date.now().toString());
            
            const array = new Uint8Array(32);
            crypto.getRandomValues(array);
            const secureToken = Array.from(array, b => b.toString(16).padStart(2, '0')).join('');
            
            let hash = 0;
            for (let i = 0; i < secureToken.length; i++) {
                const char = secureToken.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            localStorage.setItem('sig_token', hash.toString(16));
        }
        
        function verificarAprovacaoLocal() {
            const session = loadSessionLocal();
            if (session && session.status === 'aprovado') {
                stopPolling();
                stopTimer();
                clearSessionLocal();
                secureLogin();
                showStatus('Login aprovado! Redirecionando...', 'aprovado');
                setTimeout(() => { window.location.href = './index.html'; }, 1000);
                return true;
            }
            return false;
        }
        
        function startPollingLocal() {
            const checkApproval = () => {
                const session = loadSessionLocal();
                if (session && session.status === 'aprovado') {
                    verificarAprovacaoLocal();
                    return;
                }
                
                if (session && session.status === 'negado') {
                    stopPolling();
                    stopTimer();
                    showStatus('Login cancelado.', 'negado');
                    return;
                }
                
                pollTimeout = setTimeout(checkApproval, 2000);
            };
            
            checkApproval();
        }
        
        const session = loadSessionLocal();
        if (session && session.status === 'aprovado') {
            const idade = Date.now() - session.created;
            if (idade < 30000) {
                secureLogin();
                window.location.href = './index.html';
            } else {
                clearSessionLocal();
            }
        }
        
        function validarCodigoManual() {
            const input = document.getElementById('codigo-manual');
            return input.value.toUpperCase().trim() === currentToken;
        }
        
        function processarLoginManual() {
            if (!currentToken) return;
            
            const inputCode = document.getElementById('codigo-manual').value.toUpperCase().trim();
            
            if (inputCode === currentToken) {
                stopPolling();
                stopTimer();
                clearSessionLocal();
                secureLogin();
                showStatus('Login aprovado! Redirecionando...', 'aprovado');
                setTimeout(() => { window.location.href = './index.html'; }, 1000);
            } else {
                showStatus('Código incorreto. Tente novamente.', 'negado');
                document.getElementById('codigo-manual').value = '';
                document.getElementById('codigo-manual').focus();
            }
        }
        
        document.getElementById('codigo-manual').addEventListener('input', function() {
            this.value = this.value.toUpperCase();
            hideStatus();
            
            if (currentToken && this.value.length === currentToken.length) {
                processarLoginManual();
            }
        });
        
        document.getElementById('codigo-manual').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') processarLoginManual();
        });
    </script>
</body>
</html>
