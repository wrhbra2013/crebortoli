<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login SIG - Cre Bortoli</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <link rel="stylesheet" href="../static/css/style2.css">
    <style>
        :root {
            --cor-principal: #8a4baf;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f7f8fc 0%, #e8eaf6 100%);
            padding: 1rem;
        }
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(108, 99, 255, 0.15);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo h1 {
            color: var(--cor-principal);
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .logo p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .qr-container {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .celular-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .qr-code {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }
        .status-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: 500;
            display: none;
        }
        .status-message.aprovado {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
            display: block;
        }
        .status-message.negado {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
            display: block;
        }
        .instructions {
            background: #e8eaf6;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: left;
            font-size: 0.9rem;
        }
        .instructions h3 {
            font-size: 1rem;
            color: var(--cor-principal);
            margin-bottom: 0.5rem;
        }
        .instructions ol {
            margin: 0;
            padding-left: 1.2rem;
        }
        .instructions li {
            margin-bottom: 0.3rem;
        }
        .btn-primary {
            background: var(--cor-principal);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background: #7a3fa0;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(138, 75, 175, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .back-link {
            margin-top: 1rem;
        }
        .back-link a {
            color: var(--cor-principal);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>SIG Cre Bortoli</h1>
            <p>Login via Celular</p>
        </div>
        
        <div id="status-message" class="status-message"></div>
        
        <div class="qr-container">
            <div class="celular-icon">📱</div>
            <div class="qr-code" id="qr-code">
                <span style="color: #999;">Aguardando...</span>
            </div>
        </div>
        
        <div class="instructions">
            <h3>Como acessar:</h3>
            <ol>
                <li>Abra este link no celular</li>
                <li>Clique em "Aprovar Login" no celular</li>
                <li>Aguarde a redireção automática</li>
            </ol>
        </div>
        
        <button class="btn-primary" onclick="gerarNovoQR(this)" id="btn-gerar">↻ Gerar Novo Código</button>
        
        <div class="back-link">
            <a href="../index.html">← Voltar ao site</a>
        </div>
    </div>

    <script>
        var SESSION_KEY = 'sig_qr_session';
        var AUTH_KEY = 'sig_authenticated';
        var POLL_INTERVAL = 1000;
        var SESSION_TIMEOUT = 30;
        
        var currentToken = null;
        var isPolling = false;
        var pollIntervalId = null;

        function getBaseUrl() {
            var path = window.location.pathname;
            var basePath = path.substring(0, path.lastIndexOf('/sig/'));
            return window.location.origin + basePath;
        }

        function getElement(id) {
            return document.getElementById(id);
        }

        function showStatus(message, type) {
            var el = getElement('status-message');
            el.textContent = message;
            el.className = 'status-message ' + type;
        }

        function hideStatus() {
            getElement('status-message').style.display = 'none';
        }

        function stopPolling() {
            if (pollIntervalId) {
                clearTimeout(pollIntervalId);
                pollIntervalId = null;
            }
            isPolling = false;
        }

        function gerarToken() {
            var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            var token = '';
            for (var i = 0; i < 8; i++) {
                token += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return token;
        }

        function saveSession(sessionData) {
            localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));
        }

        function clearSession() {
            localStorage.removeItem(SESSION_KEY);
        }

        function loadSession() {
            var stored = localStorage.getItem(SESSION_KEY);
            if (stored) {
                return JSON.parse(stored);
            }
            return null;
        }



        function displayToken(token) {
            var container = getElement('qr-code');
            container.innerHTML = '';
            
            var qrUrl = getBaseUrl() + '/sig/aprovar.html?token=' + token;
            
            new QRCode(container, {
                text: qrUrl,
                width: 180,
                height: 180,
                colorDark: '#8a4baf',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
            

        }

        function generateQR() {
            var btn = getElement('btn-gerar');
            var originalText = btn ? btn.textContent : 'Gerar Novo';

            if (btn) {
                btn.disabled = true;
                btn.textContent = 'Gerando...';
            }
            hideStatus();
            displayToken('...');

            stopPolling();

            var token = gerarToken();
            currentToken = token;

            var sessionData = {
                token: token,
                criadoEm: Date.now(),
                status: 'aguardando'
            };
            saveSession(sessionData);

            if (btn) {
                btn.disabled = false;
                btn.textContent = '↻ Gerar Novo Código';
            }

            displayToken(token);
            checkStatus();
        }

        function checkStatus() {
            if (!currentToken || isPolling) return;
            isPolling = true;

            var sessionData = loadSession();
            if (!sessionData || sessionData.token !== currentToken) {
                stopPolling();
                return;
            }

            var age = (Date.now() - sessionData.criadoEm) / 1000;
            if (age >= SESSION_TIMEOUT) {
                stopPolling();
                clearSession();
                showStatus('Sessão expirada. Gere um novo código.', 'negado');
                return;
            }

            if (sessionData.status === 'aprovado') {
                stopPolling();
                clearSession();
                localStorage.setItem(AUTH_KEY, 'true');
                localStorage.setItem('sig_user_email', 'qr-auth');
                showStatus('Login aprovado! Redirecionando...', 'aprovado');
                setTimeout(function() { window.location.href = './index.html'; }, 1000);
                return;
            }

            if (sessionData.status === 'negado') {
                stopPolling();
                clearSession();
                showStatus('Login negado.', 'negado');
                return;
            }

            isPolling = false;
            pollIntervalId = setTimeout(checkStatus, POLL_INTERVAL);
        }

        function loadFromStorage() {
            var sessionData = loadSession();
            if (sessionData) {
                var age = (Date.now() - sessionData.criadoEm) / 1000;
                if (age < SESSION_TIMEOUT && sessionData.status === 'aguardando') {
                    currentToken = sessionData.token;
                    displayToken(currentToken);
                    checkStatus();
                    return true;
                } else {
                    clearSession();
                }
            }
            return false;
        }

        window.gerarNovoQR = function(btn) {
            generateQR();
        };

        window.onload = function() {
            if (!loadFromStorage()) {
                generateQR();
            }
        };
    </script>
</body>
</html>
