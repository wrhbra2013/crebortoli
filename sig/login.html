<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login SIG - Cre Bortoli</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <link rel="stylesheet" href="../static/css/style2.css">
    <style>
        @font-face {
            font-family: 'World of Water';
            src: url('/static/fonts/World_Discovery_Five_PERSONAL_Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        :root {
            --cor-principal: #8a4baf;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f7f8fc 0%, #e8eaf6 100%);
            padding: 1rem;
        }
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(108, 99, 255, 0.15);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo h1 {
            color: var(--cor-principal);
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-family: 'World of Water', cursive;
        }
        .logo p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .qr-container {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .celular-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .qr-code {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }
        .status-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: 500;
            display: none;
        }
        .status-message.aprovado {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
            display: block;
        }
        .status-message.negado {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
            display: block;
        }
        .instructions {
            background: #e8eaf6;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: left;
            font-size: 0.9rem;
        }
        .instructions h3 {
            font-size: 1rem;
            color: var(--cor-principal);
            margin-bottom: 0.5rem;
        }
        .instructions ol {
            margin: 0;
            padding-left: 1.2rem;
        }
        .instructions li {
            margin-bottom: 0.3rem;
        }
        .btn-primary {
            display: inline-block;
            padding: 0.75rem 2rem;
            background-color: var(--cor-principal);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, transform 0.2s;
        }
        .btn-primary:hover {
            background-color: #7a3fa0;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(138, 75, 175, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .back-link {
            margin-top: 1rem;
        }
        .back-link a {
            color: var(--cor-principal);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Cre Bortoli</h1>
            <p>Login via Celular</p>
        </div>
        
        <div id="status-message" class="status-message"></div>

        <div class="timer" id="timer" style="display: none; margin-bottom: 1rem; padding: 0.5rem; background: #fff3cd; border-radius: 8px; text-align: center;">
            <span style="color: #856404; font-weight: bold;">⏱️ Expira em: <span id="countdown">60</span>s</span>
        </div>
        
        <div class="qr-container">
            <div class="celular-icon">📱</div>
            <div class="qr-code" id="qr-code">
                <span style="color: #999;">Aguardando...</span>
            </div>
        </div>

        <div class="approval-section" id="approval-section" style="display: none;">
            <a id="whatsapp-link" href="#" target="_blank" style="display: block; text-align: center; text-decoration: none; background-color: #25D366; color: white; padding: 0.75rem; border-radius: 5px; font-weight: bold; margin-bottom: 1rem;">📱 Enviar Código via WhatsApp</a>
            <p style="margin-bottom: 0.5rem; color: #666; font-size: 0.9rem;">Digite o código do QRCode:</p>
            <input type="text" id="approval-code" placeholder="Código" maxlength="8" style="width: 100%; padding: 0.8rem; font-size: 1.2rem; text-align: center; letter-spacing: 3px; border: 2px solid #ddd; border-radius: 8px; text-transform: uppercase; margin-bottom: 0.5rem; box-sizing: border-box; outline: none; cursor: text;">
        </div>
        
        <button class="btn-primary" onclick="gerarNovoQR(this)" id="btn-gerar">↻ Gerar Novo Código</button>
        
        <div class="back-link">
            <a href="../index.html">← Voltar ao site</a>
        </div>
    </div>

    <script>
        var SESSION_KEY = 'sig_qr_session';
        var AUTH_KEY = 'sig_authenticated';
        var POLL_INTERVAL = 1000;
        var SESSION_TIMEOUT = 60;
        
        var currentToken = null;
        var isPolling = false;
        var pollIntervalId = null;

        function getBaseUrl() {
            var path = window.location.pathname;
            var basePath = path.substring(0, path.lastIndexOf('/sig/'));
            return window.location.origin + basePath;
        }

        function getElement(id) {
            return document.getElementById(id);
        }

        function showStatus(message, type) {
            var el = getElement('status-message');
            el.textContent = message;
            el.className = 'status-message ' + type;
        }

        function hideStatus() {
            getElement('status-message').style.display = 'none';
        }

        function stopPolling() {
            if (pollIntervalId) {
                clearTimeout(pollIntervalId);
                pollIntervalId = null;
            }
            isPolling = false;
        }

        function gerarToken() {
            var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            var token = '';
            for (var i = 0; i < 8; i++) {
                token += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return token;
        }

        function syncToServer(acao, token) {
            return fetch(getBaseUrl() + '/api_session.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ acao: acao, token: token })
            }).then(function(response) { return response.json(); })
            .catch(function() { return null; });
        }

        function saveSessionLocal(sessionData) {
            localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));
        }

        function clearSessionLocal() {
            localStorage.removeItem(SESSION_KEY);
        }

        function loadSessionLocal() {
            var stored = localStorage.getItem(SESSION_KEY);
            if (stored) {
                return JSON.parse(stored);
            }
            return null;
        }

        function displayToken(token) {
            var container = getElement('qr-code');
            container.innerHTML = '';
            
            var qrUrl = getBaseUrl() + '/sig/aprovar.html?token=' + token;
            
            new QRCode(container, {
                text: qrUrl,
                width: 180,
                height: 180,
                colorDark: '#8a4baf',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });

        }

        async function approveLogin() {
            var inputCode = getElement('approval-code');
            var code = inputCode.value.toUpperCase().trim();
            
            if (!code) {
                showStatus('Digite o código de acesso.', 'negado');
                return;
            }
            
            if (code !== currentToken) {
                showStatus('Código incorreto. Tente novamente.', 'negado');
                inputCode.value = '';
                return;
            }

            var result = await syncToServer('aprovar', code);
            
            if (result && result.sucesso) {
                stopPolling();
                stopTimer();
                clearSessionLocal();
                localStorage.setItem(AUTH_KEY, 'true');
                localStorage.setItem('sig_user_email', 'qr-auth');
                showStatus('Login aprovado! Redirecionando...', 'aprovado');
                setTimeout(function() { window.location.href = './index.html'; }, 1000);
            } else {
                var sessionData = loadSessionLocal();
                if (sessionData && sessionData.token === code) {
                    sessionData.status = 'aprovado';
                    sessionData.aprovadoEm = Date.now();
                    saveSessionLocal(sessionData);
                }
                stopPolling();
                stopTimer();
                clearSessionLocal();
                localStorage.setItem(AUTH_KEY, 'true');
                localStorage.setItem('sig_user_email', 'qr-auth');
                showStatus('Login aprovado! Redirecionando...', 'aprovado');
                setTimeout(function() { window.location.href = './index.html'; }, 1000);
            }
        }

        var countdownInterval = null;

        function startTimer() {
            var countdown = SESSION_TIMEOUT;
            var countdownEl = getElement('countdown');
            var timerEl = getElement('timer');
            
            timerEl.style.display = 'block';
            countdownEl.textContent = countdown;
            
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(function() {
                countdown--;
                countdownEl.textContent = countdown;
                
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    stopPolling();
                    clearSessionLocal();
                    getElement('timer').style.display = 'none';
                    getElement('approval-section').style.display = 'none';
                    showStatus('Sessão expirada. Gere um novo código.', 'negado');
                }
            }, 1000);
        }

        function stopTimer() {
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            getElement('timer').style.display = 'none';
        }

        function generateQR() {
            var btn = getElement('btn-gerar');

            if (btn) {
                btn.disabled = true;
                btn.textContent = 'Gerando...';
            }
            hideStatus();
            stopPolling();
            stopTimer();
            displayToken('...');

            var token = gerarToken();
            currentToken = token;

            var sessionData = {
                token: token,
                criadoEm: Date.now(),
                status: 'aguardando'
            };
            saveSessionLocal(sessionData);

            syncToServer('criar', token).catch(function() {});

            getElement('approval-section').style.display = 'block';
            getElement('approval-code').value = '';
            
            var whatsappLink = getElement('whatsapp-link');
            if (whatsappLink) {
                var message = encodeURIComponent('Código de acesso SIG: ' + token);
                whatsappLink.href = 'https://wa.me/5514996638056?text=' + message;
            }

            if (btn) {
                btn.disabled = false;
                btn.textContent = '↻ Gerar Novo Código';
            }

            displayToken(token);
            startTimer();
            checkStatus();
        }

        async function checkStatus() {
            if (!currentToken || isPolling) return;
            isPolling = true;

            var sessionData = loadSessionLocal();
            if (!sessionData || sessionData.token !== currentToken) {
                stopPolling();
                return;
            }

            var age = (Date.now() - sessionData.criadoEm) / 1000;
            if (age >= SESSION_TIMEOUT) {
                stopPolling();
                stopTimer();
                clearSessionLocal();
                showStatus('Sessão expirada. Gere um novo código.', 'negado');
                return;
            }

            var serverResult = await syncToServer('verificar', currentToken);
            
            if (serverResult && serverResult.status === 'aprovado') {
                stopPolling();
                stopTimer();
                clearSessionLocal();
                localStorage.setItem(AUTH_KEY, 'true');
                localStorage.setItem('sig_user_email', 'qr-auth');
                showStatus('Login aprovado! Redirecionando...', 'aprovado');
                setTimeout(function() { window.location.href = './index.html'; }, 1000);
                return;
            }

            if (serverResult && (serverResult.status === 'expirada' || serverResult.status === 'nao_encontrada')) {
                stopPolling();
                stopTimer();
                clearSessionLocal();
                showStatus('Sessão expirada. Gere um novo código.', 'negado');
                return;
            }

            if (sessionData.status === 'aprovado') {
                stopPolling();
                stopTimer();
                clearSessionLocal();
                localStorage.setItem(AUTH_KEY, 'true');
                localStorage.setItem('sig_user_email', 'qr-auth');
                showStatus('Login aprovado! Redirecionando...', 'aprovado');
                setTimeout(function() { window.location.href = './index.html'; }, 1000);
                return;
            }

            isPolling = false;
            pollIntervalId = setTimeout(checkStatus, POLL_INTERVAL);
        }

        function loadFromStorage() {
            var sessionData = loadSessionLocal();
            if (sessionData) {
                var age = (Date.now() - sessionData.criadoEm) / 1000;
                if (age < SESSION_TIMEOUT && sessionData.status === 'aguardando') {
                    currentToken = sessionData.token;
                    displayToken(currentToken);
                    checkStatus();
                    return true;
                } else {
                    clearSessionLocal();
                }
            }
            return false;
        }

        window.gerarNovoQR = function(btn) {
            generateQR();
        };

        function setupAutoApprove() {
            var input = getElement('approval-code');
            if (input) {
                input.addEventListener('input', function() {
                    var code = this.value.toUpperCase().trim();
                    console.log('Input:', code, 'Token:', currentToken);
                    if (code.length >= 4 && code === currentToken) {
                        console.log('Aprovando...');
                        approveLogin();
                    }
                });
            }
        }

        window.onload = function() {
            setupAutoApprove();
            if (!loadFromStorage()) {
                generateQR();
            }
        };
    </script>
</body>
</html>
