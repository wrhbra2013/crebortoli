<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIG Cre Bortoli</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <link rel="stylesheet" href="../static/css/style2.css">
    <style>
        :root {
            --cor-principal: #8a4baf;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f7f8fc 0%, #e8eaf6 100%);
        }
        .login-container {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(108, 99, 255, 0.15);
            width: 100%;
            max-width: 420px;
            margin: 1rem;
            text-align: center;
        }
        .logo h1 {
            color: var(--cor-principal);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .logo p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .qr-container {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .qr-code {
            width: 200px;
            height: 200px;
            margin: 0 auto 1rem;
            background: white;
            border: 3px solid var(--cor-principal);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .qr-code canvas {
            max-width: 100%;
            cursor: pointer;
        }
        .token-info {
            font-size: 0.85rem;
            color: #666;
        }
        .token-code {
            font-family: 'Courier New', monospace;
            background: var(--cor-principal);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            display: inline-block;
            margin-top: 0.5rem;
            font-size: 1.3rem;
            letter-spacing: 3px;
            font-weight: bold;
        }
        .instructions {
            background: #e8eaf6;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: left;
            font-size: 0.9rem;
            color: #444;
            border-left: 4px solid var(--cor-principal);
        }
        .instructions h3 {
            margin-bottom: 0.5rem;
            font-size: 1rem;
            color: var(--cor-principal);
        }
        .instructions ol {
            margin: 0;
            padding-left: 1.2rem;
        }
        .instructions li {
            margin-bottom: 0.3rem;
        }
        .status-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: 500;
        }
        .status-message.aguardando {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
        }
        .status-message.aprovado {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        .status-message.negado {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        .btn-primary {
            background: var(--cor-principal);
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        .btn-primary:hover {
            background: #5a52d5;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 99, 255, 0.3);
        }
        .back-link {
            margin-top: 1.5rem;
        }
        .back-link a {
            color: var(--cor-principal);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .celular-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .loading {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>SIG Cre Bortoli</h1>
            <p>Sistema de Gestão Interna</p>
        </div>
        
        <div id="status-message" class="status-message" style="display: none;"></div>
        
        <div class="qr-container">
            <div class="celular-icon">📱</div>
            <div class="qr-code" id="qr-code">
                <span style="color: #999;">Gerando QR Code...</span>
            </div>
            <div class="token-info">
                Código da sessão:
                <div class="token-code" id="token-display">-</div>
            </div>
        </div>
        
        <div class="instructions">
            <h3>Como acessar:</h3>
            <ol>
                <li>Escaneie o QR Code com a câmera do celular</li>
                <li>Ou toque no QR Code para abrir no celular</li>
                <li>Clique em "Aprovar Login" no celular</li>
                <li>Aguarde a redireção automática</li>
            </ol>
        </div>
        
        <button class="btn-primary" onclick="gerarNovoQR(this)">↻ Gerar Novo QR Code</button>
        
        <div class="back-link">
            <a href="../index.html">← Voltar ao site</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <script>
        const AuthQR = (() => {
            const AUTH_KEY = 'sig_authenticated';
            const POLL_INTERVAL = 2000;
            let currentToken = null;
            let isPolling = false;
            let pollIntervalId = null;

            function getBaseUrl() {
                const path = window.location.pathname;
                const basePath = path.substring(0, path.lastIndexOf('/sig/'));
                return window.location.origin + basePath;
            }

            function getApiUrl() {
                return getBaseUrl() + '/api.php';
            }

            function getElement(id) {
                return document.getElementById(id);
            }

            function setElementContent(id, html) {
                getElement(id).innerHTML = html;
            }

            function showStatus(message, type) {
                const el = getElement('status-message');
                el.textContent = message;
                el.className = `status-message ${type}`;
                el.style.display = 'block';
            }

            function hideStatus() {
                getElement('status-message').style.display = 'none';
            }

            function stopPolling() {
                if (pollIntervalId) {
                    clearInterval(pollIntervalId);
                    pollIntervalId = null;
                }
                isPolling = false;
            }

            async function criarSessaoAPI() {
                try {
                    const response = await fetch(getApiUrl() + '?acao=criar_sessao');
                    const data = await response.json();
                    if (data.sucesso && data.token) {
                        return data.token;
                    }
                    return null;
                } catch (e) {
                    console.error('Erro ao criar sessão:', e);
                    return null;
                }
            }

            async function verificarStatusAPI(token) {
                try {
                    const response = await fetch(getApiUrl() + '?acao=verificar_sessao&token=' + token);
                    const data = await response.json();
                    return data;
                } catch (e) {
                    console.error('Erro ao verificar status:', e);
                    return null;
                }
            }

            function checkStatus() {
                if (!currentToken || isPolling) return;
                isPolling = true;

                verificarStatusAPI(currentToken).then(data => {
                    if (data && data.sucesso) {
                        if (data.status === 'aprovado') {
                            stopPolling();
                            localStorage.setItem(AUTH_KEY, 'true');
                            localStorage.setItem('sig_user_email', 'qr-auth');
                            showStatus('Login aprovado! Redirecionando...', 'aprovado');
                            setTimeout(() => window.location.href = 'index.html', 1000);
                            return;
                        }

                        if (data.status === 'negado') {
                            stopPolling();
                            showStatus('Login negado. Gere um novo QR Code.', 'negado');
                            return;
                        }
                    }

                    isPolling = false;
                    pollIntervalId = setTimeout(checkStatus, POLL_INTERVAL);
                }).catch(() => {
                    isPolling = false;
                    pollIntervalId = setTimeout(checkStatus, POLL_INTERVAL);
                });
            }

            function generateQRCanvas(code) {
                const canvas = document.createElement('canvas');
                new QRious({
                    element: canvas,
                    value: code,
                    size: 180,
                    background: 'white',
                    foreground: '#8a4baf',
                    level: 'M',
                    padding: 10
                });
                return canvas;
            }

            async function generateQR(button) {
                const btn = button || document.querySelector('.btn-primary');
                const originalText = btn.textContent;

                btn.disabled = true;
                btn.textContent = 'Gerando...';
                hideStatus();
                setElementContent('qr-code', '<span style="color: #999;">Gerando...</span>');

                stopPolling();

                const token = await criarSessaoAPI();

                if (!token) {
                    btn.disabled = false;
                    btn.textContent = originalText;
                    setElementContent('qr-code', '<span style="color: #dc3545;">Erro ao gerar sessão</span>');
                    showStatus('Erro ao conectar com o servidor.', 'negado');
                    return;
                }

                currentToken = token;

                btn.disabled = false;
                btn.textContent = '↻ Gerar Novo QR Code';
                getElement('token-display').textContent = token;

                const confirmUrl = `${getBaseUrl()}/sig/confirmar.html?codigo=${token}`;
                const canvas = generateQRCanvas(confirmUrl);
                setElementContent('qr-code', '');
                getElement('qr-code').appendChild(canvas);

                checkStatus();
            }

            function init() {
                generateQR();
            }

            return { init, generateQR };
        })();

        AuthQR.init();
    </script>
</body>
</html>
