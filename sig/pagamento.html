        .copiar-btn {

            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .copiar-btn:hover {
            background: #388e3c;
        }
        .qr-code {
            text-align: center;
            padding: 1rem;
        }
        .qr-code img {
            max-width: 200px;
            border: 4px solid #4caf50;
            border-radius: 8px;
        }
        .agendamentos-pendentes {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 1.5rem;
        }
        .agendamentos-pendentes h3 {
            color: #e65100;
            margin-top: 0;
        }
        .agendamento-item {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;

        .agendamento-item h4 {

        .btn-pagar {
            background: #4caf50;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;

            margin-top: 0.5rem;
        }
        .btn-pagar:hover {
            background: #388e3c;
        }
        .btn-pago {
            background: #2196f3;
        }
        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .status-pendente {
            background: #fff3cd;
            color: #856404;
        }
        .status-pago {
            background: #d4edda;
            color: #155724;
        }
        .alert-info {
            background: #e3f2fd;
            border: 1px solid #2196f3;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

    <div id="footer-placeholder"></div>
    <script type="module">import '../static/js/pb-db.js';</script>
    <script>var v='1.0.0';document.write('<script src="../static/js/components.js?v='+v+'"><\/script>');</script>
    <script>
        let agendamentosCache = null;

        async function loadAgendamentos() {
            agendamentosCache = await agendamentos.getAll();
        }

        function getAgendamentosPendentes() {
            return (agendamentosCache || [])
                .filter(a => !a.pago && a.status !== 'CONCLUIDO')
                .sort((a, b) => new Date(a.data) - new Date(b.data));
        }

        function renderAgendamentos() {
            const agendamentos = getAgendamentosPendentes();
            const container = document.getElementById('lista-agendamentos');
            
            if (agendamentos.length === 0) {
                container.innerHTML = '<p style="color: #666;">Nenhum agendamento pendente de pagamento.</p>';
                return;
            }

        function renderAgendamentos() {
            const agendamentos = AgendamentoStore.getAll()
                .filter(a => !a.pago && a.status !== 'CONCLUIDO')
                .sort((a, b) => new Date(a.data) - new Date(b.data));
            
            const container = document.getElementById('lista-agendamentos');
            
            if (agendamentos.length === 0) {
                container.innerHTML = '<p style="color: #666;">Nenhum agendamento pendente de pagamento.</p>';
                return;
            }
            
            container.innerHTML = agendamentos.map(a => `
                <div class="agendamento-item">
                    <h4>${a.servicoNome}</h4>
                    <div class="info"><strong>Data:</strong> ${formatarData(a.data)}</div>
                    <div class="info"><strong>Horário:</strong> ${a.hora}</div>
                    <div class="info"><strong>Cliente:</strong> ${a.cliente}</div>
                    <div class="valor">Total: R$ ${a.valor.toFixed(2).replace('.', ',')}</div>
                    <button class="btn-pagar" onclick="marcarPago('${a.id}')">&#10004; Confirmar Pagamento</button>
                    <a href="https://api.whatsapp.com/send?phone=5514996638056&text=Olá!%20Estou%20enviando%20o%20comprovante%20do%20agendamento%20de%20${encodeURIComponent(a.servicoNome)}%20no%20valor%20de%20R$%20${a.valor.toFixed(2).replace('.', ',')}" 
                       class="btn-pagar" 
                       style="background: #25d366; display: inline-block; text-decoration: none; margin-left: 0.5rem;">
                        &#128222; Enviar Comprovante
                    </a>
                </div>
            `).join('');
        }

        function formatarData(dataStr) {
            const data = new Date(dataStr);
            return data.toLocaleDateString('pt-BR');
        }

        async function marcarPago(id) {
            if (confirm('Confirmar pagamento deste agendamento?')) {
                await agendamentos.update(id, { pago: true, status: 'PAGO' });
                await loadAgendamentos();
                renderAgendamentos();
                alert('Pagamento confirmado com sucesso!');
            }
        }

        (async () => {
            await loadAgendamentos();
            renderAgendamentos();
        })();
    </script>
