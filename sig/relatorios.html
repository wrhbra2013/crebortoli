<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cre Bortoli</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <script>var v='1.0.0';document.write('<link rel="stylesheet" href="../static/css/style.css?v='+v+'">');</script>
    <style>
        @font-face {
            font-family: 'World of Water';
            src: url('/static/fonts/World_Discovery_Five_PERSONAL_Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        .relatorios-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .relatorios-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .relatorios-header h1 {
            color: #e91e63;
            margin-bottom: 0.5rem;
        }
        .filtros {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }
        .filtro-group {
            flex: 1;
            min-width: 200px;
        }
        .filtro-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 500;
            color: #333;
        }
        .filtro-group select, .filtro-group input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
        }
        .btn-gerar {
            background: #e91e63;
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-gerar:hover {
            background: #c2185b;
        }
        .btn-pdf {
            background: #4caf50;
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-pdf:hover {
            background: #388e3c;
        }
        .resumo-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .resumo-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 1.5rem;
            text-align: center;
        }
        .resumo-card h3 {
            margin: 0 0 0.5rem 0;
            color: #666;
            font-size: 0.9rem;
        }
        .resumo-card .valor {
            font-size: 2rem;
            font-weight: bold;
            color: #e91e63;
        }
        .resumo-card.total .valor {
            color: #2e7d32;
        }
        .resumo-card.cancelados .valor {
            color: #f44336;
        }
        .tabela-relatorio {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        .tabela-relatorio th {
            background: #e91e63;
            color: white;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
        }
        .tabela-relatorio td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #eee;
        }
        .tabela-relatorio tr:hover {
            background: #fce4ec;
        }
        .tabela-relatorio tr:last-child td {
            border-bottom: none;
        }
        .badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .badge-pago {
            background: #d4edda;
            color: #155724;
        }
        .badge-pendente {
            background: #fff3cd;
            color: #856404;
        }
        .badge-cancelado {
            background: #f8d7da;
            color: #721c24;
        }
        .badge-concluido {
            background: #cce5ff;
            color: #004085;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .agrupamento {
            background: #f8bbd0;
            font-weight: bold;
            color: #880e4f;
        }
        .subtotal {
            background: #fce4ec;
            font-weight: bold;
        }
        .subtotal td {
            border-top: 2px solid #e91e63;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="relatorios-container">
            <div class="relatorios-header">
                <h1 style="font-family: 'World of Water', cursive;">Cre Bortoli</h1>
                <p>Análise de vendas de serviços por período</p>
            </div>

            <div class="filtros">
                <div class="filtro-group">
                    <label for="tipo-periodo">Período</label>
                    <select id="tipo-periodo" onchange="alternarPeriodo()">
                        <option value="mensal">Mensal</option>
                        <option value="anual">Anual</option>
                    </select>
                </div>
                <div class="filtro-group" id="filtro-mes">
                    <label for="mes">Mês</label>
                    <select id="mes">
                        <option value="0">Janeiro</option>
                        <option value="1">Fevereiro</option>
                        <option value="2">Março</option>
                        <option value="3">Abril</option>
                        <option value="4">Maio</option>
                        <option value="5">Junho</option>
                        <option value="6">Julho</option>
                        <option value="7">Agosto</option>
                        <option value="8">Setembro</option>
                        <option value="9">Outubro</option>
                        <option value="10">Novembro</option>
                        <option value="11">Dezembro</option>
                    </select>
                </div>
                <div class="filtro-group" id="filtro-ano">
                    <label for="ano">Ano</label>
                    <select id="ano"></select>
                </div>
                <button class="btn-gerar" onclick="gerarRelatorio()">Gerar Relatório</button>
                <button class="btn-pdf" onclick="gerarPDF()">&#128196; Gerar PDF</button>
            </div>

            <div class="resumo-cards">
                <div class="resumo-card total">
                    <h3>Total Recebido</h3>
                    <div class="valor" id="total-recebido">R$ 0,00</div>
                </div>
                <div class="resumo-card">
                    <h3>Total Pendente</h3>
                    <div class="valor" id="total-pendente">R$ 0,00</div>
                </div>
                <div class="resumo-card">
                    <h3>Qtd. Serviços</h3>
                    <div class="valor" id="qtd-servicos">0</div>
                </div>
                <div class="resumo-card">
                    <h3>Tíquete Médio</h3>
                    <div class="valor" id="ticket-medio">R$ 0,00</div>
                </div>
            </div>

            <div id="tabela-container">
                <table class="tabela-relatorio" id="tabela-relatorio">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Cliente</th>
                            <th>Serviço</th>
                            <th>Valor</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script>var v='1.0.0';document.write('<script src="../static/js/components.js?v='+v+'"><\/script>');document.write('<script src="../static/js/storage.js?v='+v+'"><\/script>');document.write('<script src="../static/js/auth-guard.js?v='+v+'"><\/script>');</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script>
        const nomesMeses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        
        let dadosServidor = { agendamentos: [] };
        let agendamentosCarregados = false;

        async function carregarDadosServidor() {
            try {
                const response = await fetch('../data.json?t=' + Date.now());
                if (response.ok) {
                    dadosServidor = await response.json();
                    if (!dadosServidor.agendamentos) {
                        dadosServidor.agendamentos = [];
                    }
                }
            } catch (e) {
                console.warn('Erro ao carregar data.json:', e);
                dadosServidor = { agendamentos: [] };
            }
            agendamentosCarregados = true;
        }

        function obterAgendamentos() {
            const local = AgendamentoStore.getAll();
            const servidor = dadosServidor.agendamentos || [];
            const mesclado = [...servidor];
            
            local.forEach(item => {
                if (!mesclado.find(a => a.id === item.id)) {
                    mesclado.push(item);
                }
            });
            
            return mesclado;
        }

        function init() {
            preencherAnos();
            const hoje = new Date();
            document.getElementById('mes').value = hoje.getMonth();
            document.getElementById('ano').value = hoje.getFullYear();
            
            carregarDadosServidor().then(() => {
                gerarRelatorio();
            });
        }

        function preencherAnos() {
            const anoSelect = document.getElementById('ano');
            const anoAtual = new Date().getFullYear();
            for (let ano = anoAtual; ano >= anoAtual - 5; ano--) {
                const option = document.createElement('option');
                option.value = ano;
                option.textContent = ano;
                anoSelect.appendChild(option);
            }
        }

        function alternarPeriodo() {
            const tipo = document.getElementById('tipo-periodo').value;
            document.getElementById('filtro-mes').style.display = tipo === 'mensal' ? 'block' : 'none';
        }

        function gerarRelatorio() {
            if (!agendamentosCarregados) {
                setTimeout(gerarRelatorio, 100);
                return;
            }
            
            const tipoPeriodo = document.getElementById('tipo-periodo').value;
            const mes = parseInt(document.getElementById('mes').value);
            const ano = parseInt(document.getElementById('ano').value);
            
            let agendamentos = obterAgendamentos();
            
            if (tipoPeriodo === 'mensal') {
                agendamentos = agendamentos.filter(a => {
                    const data = new Date(a.data);
                    return data.getMonth() === mes && data.getFullYear() === ano;
                });
            } else {
                agendamentos = agendamentos.filter(a => {
                    const data = new Date(a.data);
                    return data.getFullYear() === ano;
                });
            }

            agendamentos.sort((a, b) => new Date(a.data) - new Date(b.data));

            let totalRecebido = 0;
            let totalPendente = 0;

            const tbody = document.getElementById('tabela-corpo');
            
            if (agendamentos.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 2rem; color: #666;">Nenhum agendamento encontrado para o período selecionado.</td></tr>`;
                document.getElementById('total-recebido').textContent = 'R$ 0,00';
                document.getElementById('total-pendente').textContent = 'R$ 0,00';
                document.getElementById('qtd-servicos').textContent = '0';
                document.getElementById('ticket-medio').textContent = 'R$ 0,00';
                return;
            }

            let html = '';
            let agrupamentoAtual = '';

            agendamentos.forEach(a => {
                let chaveAgrupamento = '';
                let labelAgrupamento = '';

                if (tipoPeriodo === 'mensal') {
                    chaveAgrupamento = a.data;
                    labelAgrupamento = formatarData(a.data);
                } else {
                    const data = new Date(a.data);
                    chaveAgrupamento = `${data.getFullYear()}-${data.getMonth()}`;
                    labelAgrupamento = nomesMeses[data.getMonth()];
                }

                if (chaveAgrupamento !== agrupamentoAtual) {
                    if (agrupamentoAtual !== '') {
                        html += `<tr class="subtotal"><td colspan="2"></td><td style="text-align: right;">Subtotal:</td><td colspan="2">R$ ${calcularSubtotal(agendamentos, agrupamentoAtual, tipoPeriodo).toFixed(2).replace('.', ',')}</td></tr>`;
                    }
                    html += `<tr class="agrupamento"><td colspan="5">${labelAgrupamento}</td></tr>`;
                    agrupamentoAtual = chaveAgrupamento;
                }

                const statusBadge = getStatusBadge(a.status, a.pago);
                if (a.pago || a.status === 'PAGO') {
                    totalRecebido += a.valor || 0;
                } else if (a.status !== 'CANCELADO') {
                    totalPendente += a.valor || 0;
                }

                html += `<tr>
                    <td>${formatarData(a.data)}</td>
                    <td>${a.cliente || 'N/A'}</td>
                    <td>${a.servicoNome || a.servico || 'N/A'}</td>
                    <td style="font-weight: bold; color: ${a.pago || a.status === 'PAGO' ? '#2e7d32' : '#e65100'}">R$ ${(a.valor || 0).toFixed(2).replace('.', ',')}</td>
                    <td>${statusBadge}</td>
                </tr>`;
            });

            if (agrupamentoAtual !== '') {
                html += `<tr class="subtotal"><td colspan="2"></td><td style="text-align: right;">Subtotal:</td><td colspan="2">R$ ${calcularSubtotal(agendamentos, agrupamentoAtual, tipoPeriodo).toFixed(2).replace('.', ',')}</td></tr>`;
            }

            tbody.innerHTML = html;

            const qtdServicos = agendamentos.filter(a => a.status !== 'CANCELADO').length;
            const ticketMedio = qtdServicos > 0 ? (totalRecebido / qtdServicos) : 0;

            document.getElementById('total-recebido').textContent = `R$ ${totalRecebido.toFixed(2).replace('.', ',')}`;
            document.getElementById('total-pendente').textContent = `R$ ${totalPendente.toFixed(2).replace('.', ',')}`;
            document.getElementById('qtd-servicos').textContent = qtdServicos;
            document.getElementById('ticket-medio').textContent = `R$ ${ticketMedio.toFixed(2).replace('.', ',')}`;
        }

        function calcularSubtotal(agendamentos, chaveAgrupamento, tipoPeriodo) {
            return agendamentos
                .filter(a => {
                    const data = new Date(a.data);
                    if (tipoPeriodo === 'mensal') {
                        return a.data === chaveAgrupamento;
                    } else {
                        const key = `${data.getFullYear()}-${data.getMonth()}`;
                        return key === chaveAgrupamento;
                    }
                })
                .filter(a => a.pago || a.status === 'PAGO')
                .reduce((sum, a) => sum + (a.valor || 0), 0);
        }

        function getStatusBadge(status, pago) {
            if (pago || status === 'PAGO') {
                return '<span class="badge badge-pago">Pago</span>';
            } else if (status === 'CANCELADO') {
                return '<span class="badge badge-cancelado">Cancelado</span>';
            } else if (status === 'CONCLUIDO') {
                return '<span class="badge badge-concluido">Concluído</span>';
            } else {
                return '<span class="badge badge-pendente">Pendente</span>';
            }
        }

        function formatarData(dataStr) {
            const data = new Date(dataStr + 'T00:00:00');
            return data.toLocaleDateString('pt-BR');
        }

        async function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const fontBase64 = await fetch('../static/fonts/World_Discovery_Five_PERSONAL_Regular.otf')
                .then(r => r.arrayBuffer())
                .then(buf => btoa(String.fromCharCode(...new Uint8Array(buf))));
            doc.addFileToVFS('WorldDiscovery.ttf', fontBase64);
            doc.addFont('WorldDiscovery.ttf', 'WorldDiscovery', 'normal');
            doc.setFont('WorldDiscovery');
            
            const tipoPeriodo = document.getElementById('tipo-periodo').value;
            const mes = parseInt(document.getElementById('mes').value);
            const ano = parseInt(document.getElementById('ano').value);
            
            let titulo = '';
            if (tipoPeriodo === 'mensal') {
                titulo = `Relatório - ${nomesMeses[mes]} de ${ano}`;
            } else {
                titulo = `Relatório Anual - ${ano}`;
            }

            doc.setDrawColor(128, 0, 128);
            doc.setLineWidth(1.5);
            doc.rect(10, 10, 190, 277);
            
            doc.setDrawColor(138, 43, 226);
            doc.setLineWidth(0.8);
            doc.rect(14, 14, 182, 269);
            
            doc.setDrawColor(186, 85, 211);
            doc.setLineWidth(0.3);
            doc.rect(18, 18, 174, 261);
            
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(10);
            doc.setTextColor(60, 60, 60);
            doc.text('Rua Francisco Martineli, 492 - Palmital, Marília, SP | (14) 99663.8056', 105, 28, { align: 'center' });
            
            doc.setFont('WorldDiscovery', 'normal');
            doc.setFontSize(22);
            doc.setTextColor(128, 0, 128);
            doc.text('Espaço Cre Bortoli', 105, 38, { align: 'center' });
            
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(11);
            doc.setTextColor(60, 60, 60);
            doc.text('Estética & Depilação', 105, 46, { align: 'center' });
            
            doc.setDrawColor(186, 85, 211);
            doc.setLineWidth(0.5);
            doc.line(25, 55, 195, 55);
            
            doc.setFontSize(14);
            doc.setTextColor(0);
            doc.setFont('helvetica', 'bold');
            doc.text(titulo, 105, 68, { align: 'center' });
            
            doc.setFontSize(10);
            doc.setFont('helvetica', 'normal');
            doc.text(`Gerado em: ${new Date().toLocaleDateString('pt-BR')}`, 105, 76, { align: 'center' });

            const totalRecebido = document.getElementById('total-recebido').textContent;
            const totalPendente = document.getElementById('total-pendente').textContent;
            const qtdServicos = document.getElementById('qtd-servicos').textContent;
            const ticketMedio = document.getElementById('ticket-medio').textContent;

            doc.setFontSize(10);
            doc.text(`Total Recebido: ${totalRecebido}`, 25, 88);
            doc.text(`Total Pendente: ${totalPendente}`, 110, 88);
            doc.text(`Qtd. Serviços: ${qtdServicos}`, 25, 95);
            doc.text(`Tíquete Médio: ${ticketMedio}`, 110, 95);

            const tableData = [];
            const rows = document.querySelectorAll('#tabela-corpo tr');
            
            rows.forEach(row => {
                if (!row.classList.contains('agrupamento') && !row.classList.contains('subtotal')) {
                    const cells = row.querySelectorAll('td');
                    if (cells.length === 5) {
                        tableData.push([
                            cells[0].textContent,
                            cells[1].textContent,
                            cells[2].textContent,
                            cells[3].textContent,
                            cells[4].textContent.trim()
                        ]);
                    }
                }
            });

            doc.autoTable({
                startY: 105,
                head: [['Data', 'Cliente', 'Serviço', 'Valor', 'Status']],
                body: tableData,
                styles: { fontSize: 8 },
                headStyles: { fillColor: [128, 0, 128] },
                alternateRowStyles: { fillColor: [245, 228, 236] }
            });

            doc.save(`relatorio-crebortoli-${ano}${tipoPeriodo === 'mensal' ? '-' + (mes + 1).toString().padStart(2, '0') : ''}.pdf`);
        }

        init();
    </script>
</body>
</html>
