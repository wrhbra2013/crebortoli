<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cre Bortoli</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <script>var v='1.0.0';document.write('<link rel="stylesheet" href="../static/css/style.css?v='+v+'">');</script>
    <style>
        
        .clinic-header {
            display: none;
        }
        .clinic-header.print {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: #fff;
            border-bottom: 2px solid #e91e63;
            margin-bottom: 1rem;
        }
        .clinic-header.print .clinic-logo {
            font-family: 'World of Water', cursive;
            font-size: 1.8rem;
            color: #e91e63;
        }
        .clinic-header.print .clinic-tagline {
            font-size: 0.85rem;
            color: #666;
            margin-top: 0.25rem;
        }
        .clinic-header.print .clinic-address {
            font-size: 0.8rem;
            color: #666;
            text-align: right;
        }
        .relatorios-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .relatorios-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .relatorios-header h1 {
            color: #e91e63;
            margin-bottom: 0.5rem;
        }
        .filtros {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }
        .filtro-group {
            flex: 1;
            min-width: 200px;
        }
        .filtro-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 500;
            color: #333;
        }
        .filtro-group select, .filtro-group input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
        }
        .btn-gerar {
            background: #e91e63;
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-gerar:hover {
            background: #c2185b;
        }
        .btn-pdf {
            background: #4caf50;
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-pdf:hover {
            background: #388e3c;
        }
        .resumo-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .resumo-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 1.5rem;
            text-align: center;
        }
        .resumo-card h3 {
            margin: 0 0 0.5rem 0;
            color: #666;
            font-size: 0.9rem;
        }
        .resumo-card .valor {
            font-size: 2rem;
            font-weight: bold;
            color: #e91e63;
        }
        .resumo-card.total .valor {
            color: #2e7d32;
        }
        .resumo-card.cancelados .valor {
            color: #f44336;
        }
        .tabela-relatorio {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        .tabela-relatorio th {
            background: #e91e63;
            color: white;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
        }
        .tabela-relatorio td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #eee;
        }
        .tabela-relatorio tr:hover {
            background: #fce4ec;
        }
        .tabela-relatorio tr:last-child td {
            border-bottom: none;
        }
        .badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .badge-pago {
            background: #d4edda;
            color: #155724;
        }
        .badge-pendente {
            background: #fff3cd;
            color: #856404;
        }
        .badge-cancelado {
            background: #f8d7da;
            color: #721c24;
        }
        .badge-concluido {
            background: #cce5ff;
            color: #004085;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .agrupamento {
            background: #f8bbd0;
            font-weight: bold;
            color: #880e4f;
        }
        .subtotal {
            background: #fce4ec;
            font-weight: bold;
        }
        .subtotal td {
            border-top: 2px solid #e91e63;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="clinic-header">
        <div>
            <div class="clinic-logo">Espaço Cre Bortoli</div>
            <div class="clinic-tagline">Estética & Depilação</div>
        </div>
        <div class="clinic-address">
            Rua Francisco Martineli, 492 - Palmital<br>
            Marília, SP | (14) 99663.8056
        </div>
    </div>

    <main>
        <div class="relatorios-container">
            <div class="relatorios-header">
                <h1>Relatórios</h1>
                <p>Análise de vendas de serviços por período</p>
            </div>

            <div class="filtros">
                <div class="filtro-group">
                    <label for="tipo-periodo">Período</label>
                    <select id="tipo-periodo" onchange="alternarPeriodo()">
                        <option value="mensal">Mensal</option>
                        <option value="anual">Anual</option>
                    </select>
                </div>
                <div class="filtro-group" id="filtro-mes">
                    <label for="mes">Mês</label>
                    <select id="mes">
                        <option value="0">Janeiro</option>
                        <option value="1">Fevereiro</option>
                        <option value="2">Março</option>
                        <option value="3">Abril</option>
                        <option value="4">Maio</option>
                        <option value="5">Junho</option>
                        <option value="6">Julho</option>
                        <option value="7">Agosto</option>
                        <option value="8">Setembro</option>
                        <option value="9">Outubro</option>
                        <option value="10">Novembro</option>
                        <option value="11">Dezembro</option>
                    </select>
                </div>
                <div class="filtro-group" id="filtro-ano">
                    <label for="ano">Ano</label>
                    <select id="ano">
                        <option value="2026">2026</option>
                        <option value="2025">2025</option>
                        <option value="2024">2024</option>
                    </select>
                </div>
                <button class="btn-pdf" onclick="window.gerarPDF()">&#128196; Gerar PDF</button>
            </div>

            <div class="resumo-cards">
                <div class="resumo-card total">
                    <h3>Total Recebido</h3>
                    <div class="valor" id="total-recebido">R$ 0,00</div>
                </div>
                <div class="resumo-card">
                    <h3>Total Pendente</h3>
                    <div class="valor" id="total-pendente">R$ 0,00</div>
                </div>
                <div class="resumo-card">
                    <h3>Qtd. Serviços</h3>
                    <div class="valor" id="qtd-servicos">0</div>
                </div>
                <div class="resumo-card">
                    <h3>Tíquete Médio</h3>
                    <div class="valor" id="ticket-medio">R$ 0,00</div>
                </div>
            </div>

            <div id="tabela-container">
                <table class="tabela-relatorio" id="tabela-relatorio">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Cliente</th>
                            <th>Serviço</th>
                            <th>Valor</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script>var v='1.0.0';document.write('<script src="../static/js/components.js?v='+v+'"><\/script>');document.write('<script src="../static/js/storage.js?v='+v+'"><\/script>');document.write('<script src="../static/js/auth-guard.js?v='+v+'"><\/script>');</script>
    <script>
        const nomesMeses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];

        function alternarPeriodo() {
            const tipo = document.getElementById('tipo-periodo').value;
            document.getElementById('filtro-mes').style.display = tipo === 'mensal' ? 'block' : 'none';
        }

        function init() {
            preencherAnos();
            const hoje = new Date();
            document.getElementById('mes').value = hoje.getMonth();
            document.getElementById('ano').value = hoje.getFullYear();
            
            gerarRelatorio();
        }

        function preencherAnos() {
            const anoSelect = document.getElementById('ano');
            const anoAtual = new Date().getFullYear();
            for (let ano = anoAtual; ano >= anoAtual - 5; ano--) {
                const option = document.createElement('option');
                option.value = ano;
                option.textContent = ano;
                anoSelect.appendChild(option);
            }
        }

        function alternarPeriodo() {
            const tipo = document.getElementById('tipo-periodo').value;
            document.getElementById('filtro-mes').style.display = tipo === 'mensal' ? 'block' : 'none';
        }

        window.alternarPeriodo = alternarPeriodo;

        function gerarRelatorio() {
            const tipoPeriodo = document.getElementById('tipo-periodo').value;
            const mes = parseInt(document.getElementById('mes').value);
            const ano = parseInt(document.getElementById('ano').value);
            
            let agendamentos = AgendamentoStore.getAll();
            
            if (tipoPeriodo === 'mensal') {
                agendamentos = agendamentos.filter(a => {
                    const data = new Date(a.data);
                    return data.getMonth() === mes && data.getFullYear() === ano;
                });
            } else {
                agendamentos = agendamentos.filter(a => {
                    const data = new Date(a.data);
                    return data.getFullYear() === ano;
                });
            }

            agendamentos.sort((a, b) => new Date(a.data) - new Date(b.data));

            let totalRecebido = 0;
            let totalPendente = 0;

            const tbody = document.getElementById('tabela-corpo');
            
            if (agendamentos.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 2rem; color: #666;">Nenhum agendamento encontrado para o período selecionado.</td></tr>`;
                document.getElementById('total-recebido').textContent = 'R$ 0,00';
                document.getElementById('total-pendente').textContent = 'R$ 0,00';
                document.getElementById('qtd-servicos').textContent = '0';
                document.getElementById('ticket-medio').textContent = 'R$ 0,00';
                return;
            }

            let html = '';
            let agrupamentoAtual = '';

            agendamentos.forEach(a => {
                let chaveAgrupamento = '';
                let labelAgrupamento = '';

                if (tipoPeriodo === 'mensal') {
                    chaveAgrupamento = a.data;
                    labelAgrupamento = formatarData(a.data);
                } else {
                    const data = new Date(a.data);
                    chaveAgrupamento = `${data.getFullYear()}-${data.getMonth()}`;
                    labelAgrupamento = nomesMeses[data.getMonth()];
                }

                if (chaveAgrupamento !== agrupamentoAtual) {
                    if (agrupamentoAtual !== '') {
                        html += `<tr class="subtotal"><td colspan="2"></td><td style="text-align: right;">Subtotal:</td><td colspan="2">R$ ${calcularSubtotal(agendamentos, agrupamentoAtual, tipoPeriodo).toFixed(2).replace('.', ',')}</td></tr>`;
                    }
                    html += `<tr class="agrupamento"><td colspan="5">${labelAgrupamento}</td></tr>`;
                    agrupamentoAtual = chaveAgrupamento;
                }

                const statusBadge = getStatusBadge(a.status, a.pago);
                if (a.pago || a.status === 'PAGO') {
                    totalRecebido += a.valor || 0;
                } else if (a.status !== 'CANCELADO') {
                    totalPendente += a.valor || 0;
                }

                html += `<tr>
                    <td>${formatarData(a.data)}</td>
                    <td>${a.cliente || 'N/A'}</td>
                    <td>${a.servicoNome || a.servico || 'N/A'}</td>
                    <td style="font-weight: bold; color: ${a.pago || a.status === 'PAGO' ? '#2e7d32' : '#e65100'}">R$ ${(a.valor || 0).toFixed(2).replace('.', ',')}</td>
                    <td>${statusBadge}</td>
                </tr>`;
            });

            if (agrupamentoAtual !== '') {
                html += `<tr class="subtotal"><td colspan="2"></td><td style="text-align: right;">Subtotal:</td><td colspan="2">R$ ${calcularSubtotal(agendamentos, agrupamentoAtual, tipoPeriodo).toFixed(2).replace('.', ',')}</td></tr>`;
            }

            tbody.innerHTML = html;

            const qtdServicos = agendamentos.filter(a => a.status !== 'CANCELADO').length;
            const ticketMedio = qtdServicos > 0 ? (totalRecebido / qtdServicos) : 0;

            document.getElementById('total-recebido').textContent = `R$ ${totalRecebido.toFixed(2).replace('.', ',')}`;
            document.getElementById('total-pendente').textContent = `R$ ${totalPendente.toFixed(2).replace('.', ',')}`;
            document.getElementById('qtd-servicos').textContent = qtdServicos;
            document.getElementById('ticket-medio').textContent = `R$ ${ticketMedio.toFixed(2).replace('.', ',')}`;
        }

        function calcularSubtotal(agendamentos, chaveAgrupamento, tipoPeriodo) {
            return agendamentos
                .filter(a => {
                    const data = new Date(a.data);
                    if (tipoPeriodo === 'mensal') {
                        return a.data === chaveAgrupamento;
                    } else {
                        const key = `${data.getFullYear()}-${data.getMonth()}`;
                        return key === chaveAgrupamento;
                    }
                })
                .filter(a => a.pago || a.status === 'PAGO')
                .reduce((sum, a) => sum + (a.valor || 0), 0);
        }

        function getStatusBadge(status, pago) {
            if (pago || status === 'PAGO') {
                return '<span class="badge badge-pago">Pago</span>';
            } else if (status === 'CANCELADO') {
                return '<span class="badge badge-cancelado">Cancelado</span>';
            } else if (status === 'CONCLUIDO') {
                return '<span class="badge badge-concluido">Concluído</span>';
            } else {
                return '<span class="badge badge-pendente">Pendente</span>';
            }
        }

        function formatarData(dataStr) {
            const data = new Date(dataStr + 'T00:00:00');
            return data.toLocaleDateString('pt-BR');
        }

        async function gerarPDF() {
            try {
                const jsPDFModule = window.jspdf;
                const jsPDF = jsPDFModule?.jsPDF || jsPDFModule;
                if (!jsPDF) {
                    alert('Biblioteca jsPDF não carregou. Carregue a página novamente.');
                    return;
                }

                const headerEl = document.querySelector('.clinic-header');
                headerEl.classList.add('print');
                const logo = headerEl.querySelector('.clinic-logo')?.textContent || 'Espaço Cre Bortoli';
                const tagline = headerEl.querySelector('.clinic-tagline')?.textContent || 'Estética & Depilação';
                const address = headerEl.querySelector('.clinic-address')?.textContent || 'Rua Francisco Martineli, 492\nPalmital - Marília, SP | (14) 99663.8056';
                headerEl.classList.remove('print');

                const doc = new jsPDF();
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                const margin = 20;
                let y = margin;

                // Header com logo em imagem gerada do canvas usando fonte local
                const fontUrl = '/static/fonts/World_Discovery_Five_PERSONAL_Regular.otf';
                const fontFace = new FontFace('WorldOfWater', `url(${fontUrl})`);
                await fontFace.load();
                document.fonts.add(fontFace);
                
                const canvas = document.createElement('canvas');
                canvas.width = 130;
                canvas.height = 28;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = 'transparent';
                ctx.clearRect(0, 0, 130, 28);
                
                // Logo com fonte local (menor para caber)
                ctx.font = '12px WorldOfWater';
                ctx.fillStyle = '#e91e63';
                ctx.fillText(logo, 2, 16);
                
                // Tagline menor
                ctx.font = 'italic 5px sans-serif';
                ctx.fillStyle = '#666666';
                ctx.fillText(tagline, 2, 24);
                
                const logoDataUrl = canvas.toDataURL('image/png');
                doc.addImage(logoDataUrl, 'PNG', margin, y, 35, 8);
                
                // Endereço (direita) - menor
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(7);
                doc.setTextColor(60, 60, 60);
                const addressLines = address.split('\n');
                let addrY = y + 3;
                addressLines.forEach(line => {
                    doc.text(line, pageWidth - margin, addrY, { align: 'right' });
                    addrY += 4;
                });
                
                doc.setDrawColor(233, 30, 99);
                doc.setLineWidth(1.5);
                doc.line(margin, y, pageWidth - margin, y);
                y += 12;

                const tipoPeriodo = document.getElementById('tipo-periodo').value;
                const mes = parseInt(document.getElementById('mes').value);
                const ano = parseInt(document.getElementById('ano').value);
                
                let titulo = '';
                if (tipoPeriodo === 'mensal') {
                    titulo = `Relatório de Serviços - ${nomesMeses[mes]} de ${ano}`;
                } else {
                    titulo = `Relatório Anual de Serviços - ${ano}`;
                }

                const totalRecebido = document.getElementById('total-recebido').textContent;
                const totalPendente = document.getElementById('total-pendente').textContent;
                const qtdServicos = document.getElementById('qtd-servicos').textContent;
                const ticketMedio = document.getElementById('ticket-medio').textContent;

                doc.setFontSize(14);
                doc.setTextColor(0, 0, 0);
                doc.text(titulo, pageWidth / 2, y, { align: 'center' });
                y += 10;

                // Box de resumo
                const boxWidth = pageWidth - (margin * 2);
                const boxHeight = 35;
                doc.setFillColor(250, 250, 252);
                doc.rect(margin, y, boxWidth, boxHeight, 'F');
                
                doc.setFontSize(10);
                doc.setTextColor(60, 60, 60);
                
                const col1 = margin + 10;
                const col2 = margin + boxWidth / 2 + 10;
                
                doc.setFontSize(9);
                doc.text('Recebido', col1, y + 10);
                doc.setFontSize(12);
                doc.setTextColor(33, 150, 83);
                doc.text(totalRecebido, col1, y + 20);
                
                doc.setFontSize(9);
                doc.setTextColor(60, 60, 60);
                doc.text('Pendente', col2, y + 10);
                doc.setFontSize(12);
                doc.setTextColor(255, 152, 0);
                doc.text(totalPendente, col2, y + 20);
                
                doc.setFontSize(9);
                doc.setTextColor(60, 60, 60);
                doc.text('Qtd.', col1, y + 30);
                doc.setTextColor(0, 0, 0);
                doc.text(qtdServicos, col1 + 20, y + 30);
                
                doc.setFontSize(9);
                doc.setTextColor(60, 60, 60);
                doc.text('Título Médio', col2, y + 30);
                doc.setTextColor(0, 0, 0);
                doc.text(ticketMedio, col2 + 35, y + 30);
                
                y += boxHeight + 10;

                const rows = document.querySelectorAll('#tabela-corpo tr');
                const tableData = [];
                rows.forEach(row => {
                    if (!row.classList.contains('agrupamento') && !row.classList.contains('subtotal')) {
                        const cells = row.querySelectorAll('td');
                        if (cells.length === 5) {
                            tableData.push([
                                cells[0].textContent,
                                cells[1].textContent,
                                cells[2].textContent,
                                cells[3].textContent,
                                cells[4].textContent.trim()
                            ]);
                        }
                    }
                });

                // Table header
                const tableWidth = pageWidth - (margin * 2);
                doc.setFillColor(233, 30, 99);
                doc.rect(margin, y, tableWidth, 8, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(8);
                doc.setFont('helvetica', 'bold');
                doc.text('Data', margin + 5, y + 5.5);
                doc.text('Cliente', margin + 30, y + 5.5);
                doc.text('Serviço', margin + 80, y + 5.5);
                doc.text('Valor', margin + tableWidth - 35, y + 5.5);
                doc.text('Status', margin + tableWidth - 15, y + 5.5);
                y += 10;

                doc.setTextColor(0, 0, 0);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(8);
                tableData.forEach((row, i) => {
                    if (y > pageHeight - 20) {
                        doc.addPage();
                        y = margin;
                    }
                    if (i % 2 === 0) {
                        doc.setFillColor(250, 250, 252);
                        doc.rect(margin, y - 3, tableWidth, 7, 'F');
                    }
                    doc.text(String(row[0]).substring(0, 10), margin + 5, y + 2);
                    doc.text(String(row[1]).substring(0, 22), margin + 30, y + 2);
                    doc.text(String(row[2]).substring(0, 30), margin + 80, y + 2);
                    doc.text(String(row[3]).substring(0, 10), margin + tableWidth - 35, y + 2);
                    doc.text(String(row[4]).substring(0, 10), margin + tableWidth - 15, y + 2);
                    y += 7;
                });

                const nomeArquivo = `relatorio-crebortoli-${ano}${tipoPeriodo === 'mensal' ? '-' + (mes + 1).toString().padStart(2, '0') : ''}.pdf`;
                doc.save(nomeArquivo);
            } catch (err) {
                console.error('Erro ao gerar PDF:', err);
                alert('Erro ao gerar PDF: ' + err.message);
            }
        }

        window.gerarPDF = gerarPDF;
        init();
    </script>
</body>
</html>
