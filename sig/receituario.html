<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cre Bortoli - Receituário</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <script>var v='1.0.0';document.write('<link rel="stylesheet" href="../static/css/style.css?v='+v+'">');</script>
    <style>
        @font-face {
            font-family: 'World of Water';
            src: url('/static/fonts/World_Discovery_Five_PERSONAL_Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        .receituario-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .receituario-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .receituario-header h1 {
            color: #e91e63;
            margin-bottom: 0.5rem;
        }
        .form-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #333;
        }
        .form-group input, 
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }
        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
        }
        .btn-primary {
            background: #e91e63;
            color: white;
        }
        .btn-primary:hover {
            background: #c2185b;
        }
        .btn-secondary {
            background: #666;
            color: white;
        }
        .btn-secondary:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="receituario-container">
            <div class="receituario-header">
                <h1>Receituário</h1>
                <p>Crie indicationes terapéuticas para seus clientes</p>
            </div>

            <div class="form-card">
                <form id="receituarioForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="paciente">Nome do Paciente</label>
                            <input type="text" id="paciente" name="paciente" required placeholder="Digite o nome do paciente">
                        </div>
                        <div class="form-group">
                            <label for="data">Data</label>
                            <input type="date" id="data" name="data" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="indicacao">Indicação Terapêutica</label>
                        <textarea id="indicacao" name="indicacao" required placeholder="Descreva as indicações terapêuticas..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="observacoes">Observações (opcional)</label>
                        <textarea id="observacoes" name="observacoes" placeholder="Observações adicionais..."></textarea>
                    </div>

                    <div class="btn-group">
                        <button type="button" class="btn btn-primary" onclick="gerarPDF()">&#128196; Gerar PDF</button>
                        <button type="button" class="btn btn-secondary" onclick="limparForm()">Limpar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>var v='1.0.0';document.write('<script src="../static/js/components.js?v='+v+'"><\/script>');document.write('<script src="../static/js/auth-guard.js?v='+v+'"><\/script>');</script>
    <script>
        document.getElementById('data').valueAsDate = new Date();
        
        let customFont = null;
        
        async function loadFont() {
            try {
                const response = await fetch('../static/fonts/World_Discovery_Five_PERSONAL_Regular.otf');
                const fontData = await response.arrayBuffer();
                customFont = new Uint8Array(fontData);
            } catch (e) {
                console.warn('Font load error:', e);
            }
        }
        loadFont();

        function limparForm() {
            document.getElementById('receituarioForm').reset();
            document.getElementById('data').valueAsDate = new Date();
        }

        function gerarPDF() {
            const paciente = document.getElementById('paciente').value;
            const data = document.getElementById('data').value;
            const indicacao = document.getElementById('indicacao').value;
            const observacoes = document.getElementById('observacoes').value;

            if (!paciente || !data || !indicacao) {
                alert('Por favor, preencha todos os campos obrigatórios.');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const dataFormatada = new Date(data).toLocaleDateString('pt-BR');
            
            doc.setDrawColor(128, 0, 128);
            doc.setLineWidth(1.5);
            doc.rect(10, 10, 190, 277);
            
            doc.setDrawColor(138, 43, 226);
            doc.setLineWidth(0.8);
            doc.rect(14, 14, 182, 269);
            
            doc.setDrawColor(186, 85, 211);
            doc.setLineWidth(0.3);
            doc.rect(18, 18, 174, 261);
            
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(10);
            doc.setTextColor(60, 60, 60);
            doc.text('Rua Francisco Martineli, 492 - Palmital, Marília, SP | (14) 99663.8056', 105, 28, { align: 'center' });
            
            if (customFont) {
                doc.addFileVFS('WorldDiscovery.ttf', customFont);
                doc.addFont('WorldDiscovery.ttf', 'WorldDiscovery', 'normal');
                doc.setFont('WorldDiscovery', 'normal');
            } else {
                doc.setFont('helvetica', 'bold');
            }
            doc.setFontSize(22);
            doc.setTextColor(128, 0, 128);
            doc.text('Espaço Cre Bortoli', 105, 38, { align: 'center' });
            
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(11);
            doc.setTextColor(60, 60, 60);
            doc.text('Estética & Depilação', 105, 46, { align: 'center' });
            
            doc.setDrawColor(186, 85, 211);
            doc.setLineWidth(0.5);
            doc.line(25, 55, 195, 55);
            
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(16);
            doc.setTextColor(128, 0, 128);
            doc.text('INDICAÇÃO TERAPÊUTICA', 105, 70, { align: 'center' });
            
            doc.setDrawColor(147, 112, 219);
            doc.setLineWidth(0.3);
            doc.line(60, 75, 150, 75);
            
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(12);
            doc.setTextColor(0, 0, 0);
            doc.text('Paciente:', 25, 90);
            doc.setFont('helvetica', 'normal');
            doc.text(paciente, 55, 90);
            
            doc.setFont('helvetica', 'bold');
            doc.text('Data:', 140, 90);
            doc.setFont('helvetica', 'normal');
            doc.text(dataFormatada, 158, 90);
            
            doc.setDrawColor(200, 200, 200);
            doc.setLineWidth(0.1);
            doc.line(25, 97, 195, 97);
            
            const splitIndicacao = doc.splitTextToSize(indicacao, 170);
            doc.text(splitIndicacao, 25, 110);
            
            let yPos = 110 + (splitIndicacao.length * 7) + 15;
            
            if (observacoes) {
                if (yPos > 230) {
                    doc.addPage();
                    yPos = 30;
                }
                
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(12);
                doc.text('Observações:', 20, yPos);
                
                doc.setFont('helvetica', 'normal');
                const splitObs = doc.splitTextToSize(observacoes, 170);
                doc.text(splitObs, 20, yPos + 7);
            }
            
            const nomeArquivo = `receituario-${paciente.replace(/\s+/g, '-').toLowerCase()}-${data}.pdf`;
            doc.save(nomeArquivo);
        }
    </script>
</body>
</html>
