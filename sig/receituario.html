<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cre Bortoli - Receituário</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <script>var v='1.0.0';document.write('<link rel="stylesheet" href="../static/css/style.css?v='+v+'">');</script>
    <style>
        @font-face {
            font-family: 'WorldDiscoveryFive';
            src: url('../static/fonts/World_Discovery_Five_PERSONAL_Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        
        .clinic-header {
            display: none;
        }
        .receituario-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .receituario-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .receituario-header h1 {
            color: #e91e63;
            margin-bottom: 0.5rem;
        }
        .form-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #333;
        }
        .form-group input, 
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }
        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
        }
        .btn-primary {
            background: #e91e63;
            color: white;
        }
        .btn-primary:hover {
            background: #c2185b;
        }
        .btn-secondary {
            background: #666;
            color: white;
        }
        .btn-secondary:hover {
            background: #444;
        }
        .historico-section {
            margin-top: 2rem;
        }
        .historico-section h2 {
            color: #e91e63;
            margin-bottom: 1rem;
        }
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f5f5f5;
            font-weight: 600;
            color: #333;
        }
        tr:hover {
            background: #fafafa;
        }
        .btn-download {
            background: #e91e63;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.875rem;
        }
        .btn-download:hover {
            background: #c2185b;
        }
        .empty-message {
            text-align: center;
            color: #666;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="clinic-header">
        <div>
            <div class="clinic-logo">Espaço Cre Bortoli</div>
            <div class="clinic-tagline">Estética & Depilação</div>
        </div>
        <div class="clinic-address">
            Rua Francisco Martineli, 492 - Palmital<br>
            Marília, SP | (14) 99663.8056
        </div>
    </div>

    <main>
        <div class="receituario-container">
            <div class="receituario-header">
                <h1>Receituário</h1>
                <p>Crie indicações terapêuticas para seus clientes</p>
            </div>

            <div class="form-card">
                <form id="receituarioForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="paciente">Nome do Paciente</label>
                            <input type="text" id="paciente" name="paciente" required placeholder="Digite o nome do paciente">
                        </div>
                        <div class="form-group">
                            <label for="data">Data</label>
                            <input type="date" id="data" name="data" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="indicacao">Indicação Terapêutica</label>
                        <textarea id="indicacao" name="indicacao" required placeholder="Descreva as indicações terapêuticas..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="observacoes">Observações (opcional)</label>
                        <textarea id="observacoes" name="observacoes" placeholder="Observações adicionais..." style="min-height: 100px;"></textarea>
                    </div>

                    <div class="btn-group">
                        <button type="button" class="btn btn-primary" onclick="gerarPDF()"> Gerar PDF</button>
                        <button type="button" class="btn btn-secondary" onclick="limparForm()">Limpar</button>
                    </div>
                </form>
            </div>

            <div class="historico-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h2>Receitas Geradas</h2>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn-download" style="background:#ff9800;" onclick="setupJSONBin()">Configurar Sync</button>
                        <button class="btn-download" style="background:#9c27b0;" onclick="mostrarStatusSync()">Status Sync</button>
                        <button class="btn-download" onclick="exportarReceitas()">Exportar</button>
                        <label class="btn-download" style="background:#2196f3; cursor: pointer;">
                            Importar
                            <input type="file" accept=".json" onchange="importarReceitas(event)" style="display: none;">
                        </label>
                    </div>
                </div>
                <div class="table-container">
                    <table id="historicoTable">
                        <thead>
                            <tr>
                                <th>Nome da Receita</th>
                                <th>Data</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="historicoBody">
                            <tr>
                                <td colspan="3" class="empty-message">Nenhuma receita gerada ainda.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>var v='1.0.1';document.write('<script src="../static/js/components.js?v='+v+'"><\/script>');document.write('<script src="../static/js/admin-key.js?v='+v+'"><\/script>');document.write('<script src="../static/js/storage.js?v='+v+'"><\/script>');document.write('<script src="../static/js/auth-guard.js?v='+v+'"><\/script>');</script>
    <script>
        document.getElementById('data').valueAsDate = new Date();
        
        async function getReceitas() {
            return await ReceitasStore.getAll();
        }
        
        async function saveReceita(receita) {
            receita.id = receita.id || crypto.randomUUID();
            receita.created_at = receita.created_at || new Date().toISOString();
            return await ReceitasStore.create(receita);
        }
        
        async function deleteReceita(id) {
            await ReceitasStore.delete(id);
        }
        
        function exportarReceitas() {
            getReceitas().then(receitas => {
                if (receitas.length === 0) {
                    alert('Não há receitas para exportar.');
                    return;
                }
                const blob = new Blob([JSON.stringify(receitas, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `receitas-backup-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            });
        }
        
        function setupJSONBin() {
            const binId = prompt('Cole o BIN ID do JSONBin.io:');
            const apiKey = prompt('Cole a API Key do JSONBin.io:');
            if (binId && apiKey) {
                localStorage.setItem('jsonbin_id', binId);
                localStorage.setItem('jsonbin_key', apiKey);
                location.reload();
            }
        }
        
        function mostrarStatusSync() {
            const JSONBIN_URL = localStorage.getItem('jsonbin_url');
            const JSONBIN_BIN_ID = localStorage.getItem('jsonbin_id');
            if (JSONBIN_URL) {
                alert('✅ Backup automático ATIVO\n\nBin ID: ' + JSONBIN_BIN_ID);
            } else {
                alert('⚠️ Backup automático NÃO configurado.\n\nClique em "Configurar Sync" para ativar.');
            }
        }
        
        function importarReceitas(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const receitas = JSON.parse(e.target.result);
                    if (Array.isArray(receitas)) {
                        for (const r of receitas) {
                            await ReceitasStore.create(r);
                        }
                        renderHistorico();
                        alert(`Importadas ${receitas.length} receitas com sucesso!`);
                    } else {
                        alert('Formato de arquivo inválido.');
                    }
                } catch (err) {
                    alert('Erro ao ler arquivo: ' + err.message);
                }
            };
            reader.readAsText(file);
        }
        
        async function renderHistorico() {
            try {
                const listaReceitas = await getReceitas();
                const tbody = document.getElementById('historicoBody');
                const isAdminUser = typeof isAdmin === 'function' && isAdmin();
                
                if (!listaReceitas || listaReceitas.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="empty-message">Nenhuma receita gerada ainda.</td></tr>';
                    return;
                }
                
                tbody.innerHTML = listaReceitas.map(r => `
                    <tr>
                        <td>${r.paciente}</td>
                        <td>${r.dataFormatada || r.data}</td>
                        <td>
                            <button class="btn-download" onclick="downloadPDF('${r.id}')">Download</button>
                            ${isAdminUser ? `<button class="btn-download" style="background:#666" onclick="excluirReceita('${r.id}')">Excluir</button>` : ''}
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('Erro ao buscar receitas:', err);
                document.getElementById('historicoBody').innerHTML = '<tr><td colspan="3" class="empty-message">Erro ao carregar receitas.</td></tr>';
            }
        }
        
        window.downloadPDF = function(id) {
            getReceitas().then(listaReceitas => {
                const receita = listaReceitas.find(r => r.id === id);
                if (receita) {
                    alert('PDF será baixado novamente.');
                }
            });
        };
        
        window.excluirReceita = async function(id) {
            if (confirm('Deseja excluir esta receita?')) {
                await deleteReceita(id);
                renderHistorico();
            }
        };
        
        window.exportarReceitas = exportarReceitas;
        window.importarReceitas = importarReceitas;
        window.setupJSONBin = setupJSONBin;
        window.mostrarStatusSync = mostrarStatusSync;
        
        function base64ToBlob(base64, mimeType) {
            const byteCharacters = atob(base64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            return new Blob([byteArray], { type: mimeType });
        }
        
        renderHistorico();
        
        window.limparForm = function() {
            document.getElementById('receituarioForm').reset();
            document.getElementById('data').valueAsDate = new Date();
        };

async function carregarFonteCustomizada(doc) {
            try {
                const fontUrl = '../static/fonts/World_Discovery_Five_PERSONAL_Regular.otf';
                const response = await fetch(fontUrl);
                if (!response.ok) throw new Error('Fonte não encontrada');
                const arrayBuffer = await response.arrayBuffer();
                const base64 = btoa(String.fromCharCode(...new Uint8Array(arrayBuffer)));
                doc.addFileToVFS('WorldDiscoveryFive.ttf', base64);
                doc.addFont('WorldDiscoveryFive.ttf', 'WorldDiscoveryFive', 'normal');
                return true;
            } catch (err) {
                console.warn('Erro ao carregar fonte customizada, usando fallback:', err);
                return false;
            }
        }

        async function desenharHeaderCustomizado(texto) {
            await document.fonts.load('18px WorldDiscoveryFive');

            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 560;
                canvas.height = 30;

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.font = '18px WorldDiscoveryFive, cursive, sans-serif';
                ctx.fillStyle = '#e91e63';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                ctx.fillText(texto, 0, 15);

                ctx.font = '8px Helvetica, sans-serif';
                ctx.fillStyle = '#666';
                ctx.textAlign = 'right';
                ctx.fillText('Rua Francisco Martineli, 492 - Palmital | Marilia, SP | (14) 99663.8056', canvas.width, 15);

                canvas.toBlob((blob) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(blob);
                });
            });
        }

        function desenharTabelaFormulario(doc, campos, startY, pageWidth, margin) {
            let y = startY;
            const lineHeight = 8;
            const boxPadding = 6;
            const labelColor = [60, 60, 60];
            const valueColor = [0, 0, 0];

            for (const campo of campos) {
                if (campo.tipo === 'titulo') {
                    doc.setFontSize(12);
                    doc.setTextColor(233, 30, 99);
                    doc.setFont('helvetica', 'bold');
                    doc.text(campo.texto.toUpperCase(), margin + boxPadding, y);
                    y += 3;
                    doc.setDrawColor(233, 30, 99);
                    doc.setLineWidth(0.8);
                    doc.line(margin, y, pageWidth - margin, y);
                    y += 8;
                    continue;
                }

                if (campo.tipo === 'linha') {
                    const maxBoxWidth = pageWidth - (margin * 2);
                    const linhas = doc.splitTextToSize(campo.conteudo || '', maxBoxWidth - (boxPadding * 2));

                    const boxHeight = Math.max(linhas.length * lineHeight + boxPadding * 2, 25);

                    doc.setFillColor(250, 250, 252);
                    doc.rect(margin, y, maxBoxWidth, boxHeight, 'F');
                    doc.setDrawColor(200, 200, 210);
                    doc.setLineWidth(0.5);
                    doc.rect(margin, y, maxBoxWidth, boxHeight, 'S');

                    if (campo.rotulo) {
                        doc.setFontSize(9);
                        doc.setTextColor(...labelColor);
                        doc.setFont('helvetica', 'bold');
                        doc.text(campo.rotulo, margin + boxPadding, y + boxPadding + 2);
                    }

                    doc.setFontSize(10);
                    doc.setTextColor(...valueColor);
                    doc.setFont('helvetica', 'normal');

                    let contentY = campo.rotulo ? y + boxPadding + 7 : y + boxPadding + 3;
                    for (const linha of linhas) {
                        if (contentY < doc.internal.pageSize.getHeight() - 20) {
                            doc.text(linha, margin + boxPadding + 4, contentY);
                            contentY += lineHeight;
                        }
                    }

                    y += boxHeight + 6;
                }

                if (y > doc.internal.pageSize.getHeight() - 30) {
                    doc.addPage();
                    y = 20;
                }
            }

            return y;
        }

async function gerarPDF() {
            const { jsPDF } = window.jspdf;
            if (!jsPDF) {
                alert('Biblioteca jsPDF não carregou.');
                return;
            }

            try {
                const paciente = document.getElementById('paciente').value;
                const indicacao = document.getElementById('indicacao').value;
                const observacoes = document.getElementById('observacoes').value;
                const dataInput = document.getElementById('data').value;

                if (!paciente || !indicacao) {
                    alert('Preencha o nome do paciente e a indicação terapêutica.');
                    return;
                }

                const dataFormatada = dataInput ? new Date(dataInput + 'T00:00:00').toLocaleDateString('pt-BR') : new Date().toLocaleDateString('pt-BR');

                const doc = new jsPDF();
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                const margin = 15;

                const fonteCarregada = await carregarFonteCustomizada(doc);

                const headerImgData = await desenharHeaderCustomizado('Espaço CreBortoli');
                doc.addImage(headerImgData, 'PNG', margin, 10, pageWidth - (margin * 2), 15);

                doc.setDrawColor(233, 30, 99);
                doc.setLineWidth(1.5);
                doc.line(margin, 27, pageWidth - margin, 27);

                let y = 35;

                if (fonteCarregada) {
                    doc.setFont('WorldDiscoveryFive', 'normal');
                    doc.setFontSize(10);
                    doc.setTextColor(233, 30, 99);
                    doc.text('Documento de Indicação Terapêutica', pageWidth / 2, y, { align: 'center' });
                } else {
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(10);
                    doc.setTextColor(233, 30, 99);
                    doc.text('Documento de Indicação Terapêutica', pageWidth / 2, y, { align: 'center' });
                }
                y += 8;

                const campos = [
                    { tipo: 'titulo', texto: 'Identificação do Paciente' },
                    {
                        tipo: 'linha',
                        rotulo: 'Paciente:',
                        conteudo: paciente
                    },
                    {
                        tipo: 'linha',
                        rotulo: 'Data:',
                        conteudo: dataFormatada
                    },
                    { tipo: 'titulo', texto: 'Indicação Terapêutica' },
                    {
                        tipo: 'linha',
                        conteudo: indicacao
                    },
                ];

                if (observacoes && observacoes.trim()) {
                    campos.push({ tipo: 'titulo', texto: 'Observações' });
                    campos.push({
                        tipo: 'linha',
                        conteudo: observacoes
                    });
                }

                const finalY = desenharTabelaFormulario(doc, campos, y, pageWidth, margin);

                const rodapeY = Math.min(finalY + 20, pageHeight - 40);
                doc.setDrawColor(180, 180, 190);
                doc.setLineWidth(0.3);
                doc.line(margin + 30, rodapeY, pageWidth / 2 - 10, rodapeY);
                doc.line(pageWidth / 2 + 10, rodapeY, pageWidth - margin - 30, rodapeY);

                doc.setFontSize(8);
                doc.setTextColor(100, 100, 100);
                doc.text('Assinatura do Profissional', pageWidth / 2, rodapeY + 5, { align: 'center' });

                doc.setFontSize(7);
                doc.setTextColor(150, 150, 150);
                doc.text(`Gerado em: ${new Date().toLocaleString('pt-BR')}`, pageWidth / 2, pageHeight - 10, { align: 'center' });

                const nomeArquivo = `receituario-${paciente.replace(/\s+/g, '-').toLowerCase()}-${dataInput}.pdf`;
                doc.save(nomeArquivo);

                await saveReceita({
                    paciente: paciente,
                    data: dataInput,
                    dataFormatada: dataFormatada,
                    indicacao: indicacao,
                    observacoes: observacoes,
                    nomeArquivo: nomeArquivo
                });

                renderHistorico();
                alert('Receita gerada com sucesso!');
            } catch (err) {
                console.error('Erro ao gerar PDF:', err);
                alert('Erro ao gerar PDF: ' + err.message);
            }
        }
    </script>
</body>
</html>
