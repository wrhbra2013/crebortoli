<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cre Bortoli - Receituário</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <script>var v='1.0.0';document.write('<link rel="stylesheet" href="../static/css/style.css?v='+v+'">');</script>
    <style>
        @font-face {
            font-family: 'WorldDiscoveryFive';
            src: url('../static/fonts/World_Discovery_Five_PERSONAL_Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        
        .clinic-header {
            display: none;
        }
        .receituario-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .receituario-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .receituario-header h1 {
            color: #e91e63;
            margin-bottom: 0.5rem;
        }
        .form-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #333;
        }
        .form-group input, 
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }
        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
        }
        .btn-primary {
            background: #e91e63;
            color: white;
        }
        .btn-primary:hover {
            background: #c2185b;
        }
        .btn-secondary {
            background: #666;
            color: white;
        }
        .btn-secondary:hover {
            background: #444;
        }
        .historico-section {
            margin-top: 2rem;
        }
        .historico-section h2 {
            color: #e91e63;
            margin-bottom: 1rem;
        }
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f5f5f5;
            font-weight: 600;
            color: #333;
        }
        tr:hover {
            background: #fafafa;
        }
        .btn-download {
            background: #e91e63;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.875rem;
        }
        .btn-download:hover {
            background: #c2185b;
        }
        .empty-message {
            text-align: center;
            color: #666;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="clinic-header">
        <div>
            <div class="clinic-logo">Espaço Cre Bortoli</div>
            <div class="clinic-tagline">Estética & Depilação</div>
        </div>
        <div class="clinic-address">
            Rua Francisco Martineli, 492 - Palmital<br>
            Marília, SP | (14) 99663.8056
        </div>
    </div>

    <main>
        <div class="receituario-container">
            <div class="receituario-header">
                <h1>Receituário</h1>
                <p>Crie indicações terapêuticas para seus clientes</p>
            </div>

            <div class="form-card">
                <form id="receituarioForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="paciente">Nome do Paciente</label>
                            <input type="text" id="paciente" name="paciente" required placeholder="Digite o nome do paciente">
                        </div>
                        <div class="form-group">
                            <label for="data">Data</label>
                            <input type="date" id="data" name="data" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="indicacao">Indicação Terapêutica</label>
                        <textarea id="indicacao" name="indicacao" required placeholder="Descreva as indicações terapêuticas..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="observacoes">Observações (opcional)</label>
                        <textarea id="observacoes" name="observacoes" placeholder="Observações adicionais..." style="min-height: 100px;"></textarea>
                    </div>

                    <div class="btn-group">
                        <button type="button" class="btn btn-primary" onclick="gerarPDF()"> Gerar PDF</button>
                        <button type="button" class="btn btn-secondary" onclick="limparForm()">Limpar</button>
                    </div>
                </form>
            </div>

            <div class="historico-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h2>Receitas Geradas</h2>
                </div>
                <div class="table-container">
                    <table id="historicoTable">
                        <thead>
                            <tr>
                                <th>Nome da Receita</th>
                                <th>Data</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="historicoBody">
                            <tr>
                                <td colspan="3" class="empty-message">Nenhuma receita gerada ainda.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../static/js/pdf-lib.min.js"></script>
    <script>var v='1.0.1';document.write('<script src="../static/js/components.js?v='+v+'"><\/script>');document.write('<script src="../static/js/admin-key.js?v='+v+'"><\/script>');document.write('<script src="../static/js/storage.js?v='+v+'"><\/script>');document.write('<script src="../static/js/auth-guard.js?v='+v+'"><\/script>');</script>
    <script>
        document.getElementById('data').valueAsDate = new Date();
        
        async function getReceitas() {
            return await ReceitasStore.getAll();
        }
        
        async function saveReceita(receita) {
            receita.id = receita.id || crypto.randomUUID();
            receita.created_at = receita.created_at || new Date().toISOString();
            return await ReceitasStore.create(receita);
        }
        
        async function deleteReceita(id) {
            await ReceitasStore.delete(id);
        }
        
        
        async function renderHistorico() {
            try {
                const listaReceitas = await getReceitas();
                const tbody = document.getElementById('historicoBody');
                const isAdminUser = typeof isAdmin === 'function' && isAdmin();
                
                if (!listaReceitas || listaReceitas.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="empty-message">Nenhuma receita gerada ainda.</td></tr>';
                    return;
                }
                
                tbody.innerHTML = listaReceitas.map(r => `
                    <tr>
                        <td>${r.paciente}</td>
                        <td>${r.dataFormatada || r.data}</td>
                        <td>
                            <button class="btn-download" onclick="downloadPDF('${r.id}')">Download</button>
                            ${isAdminUser ? `<button class="btn-download" style="background:#666" onclick="excluirReceita('${r.id}')">Excluir</button>` : ''}
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('Erro ao buscar receitas:', err);
                document.getElementById('historicoBody').innerHTML = '<tr><td colspan="3" class="empty-message">Erro ao carregar receitas.</td></tr>';
            }
        }
        
        window.downloadPDF = function(id) {
            getReceitas().then(listaReceitas => {
                const receita = listaReceitas.find(r => r.id === id);
                if (receita) {
                    alert('PDF será baixado novamente.');
                }
            });
        };
        
        window.excluirReceita = async function(id) {
            if (confirm('Deseja excluir esta receita?')) {
                await deleteReceita(id);
                renderHistorico();
            }
        };
        

        
        function base64ToBlob(base64, mimeType) {
            const byteCharacters = atob(base64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            return new Blob([byteArray], { type: mimeType });
        }

        renderHistorico();

        window.limparForm = function() {
            document.getElementById('receituarioForm').reset();
            document.getElementById('data').valueAsDate = new Date();
        };

        async function carregarFontePDFLib() {
            try {
                const fontUrl = '../static/fonts/World_Discovery_Five_PERSONAL_Regular.otf';
                const response = await fetch(fontUrl);
                if (!response.ok) throw new Error('Fonte não encontrada');
                return await response.arrayBuffer();
            } catch (err) {
                console.warn('Erro ao carregar fonte customizada:', err);
                return null;
            }
        }

        async function gerarPDF() {
            const { PDFDocument, rgb, StandardFonts } = PDFLib;
            if (!PDFDocument) {
                alert('Biblioteca pdf-lib não carregou.');
                return;
            }

            try {
                const paciente = document.getElementById('paciente').value;
                const indicacao = document.getElementById('indicacao').value;
                const observacoes = document.getElementById('observacoes').value;
                const dataInput = document.getElementById('data').value;

                if (!paciente || !indicacao) {
                    alert('Preencha o nome do paciente e a indicação terapêutica.');
                    return;
                }

                const dataFormatada = dataInput ? new Date(dataInput + 'T00:00:00').toLocaleDateString('pt-BR') : new Date().toLocaleDateString('pt-BR');

                const pdfDoc = await PDFDocument.create();

                const fontBytes = await carregarFontePDFLib();
                let customFont;
                if (fontBytes) {
                    customFont = await pdfDoc.embedFont(fontBytes);
                }

                const helveticaFont = await pdfDoc.embedStandardFont(StandardFonts.Helvetica);
                const helveticaBold = await pdfDoc.embedStandardFont(StandardFonts.HelveticaBold);

                const page = pdfDoc.addPage();
                const { width, height } = page.getSize();
                const margin = 50;

                const rosa = rgb(233/255, 30/255, 99/255);
                const cinza = rgb(102/255, 102/255, 102/255);
                const preto = rgb(0, 0, 0);

                if (customFont) {
                    page.drawText('Espaço CreBortoli', {
                        x: margin,
                        y: height - 40,
                        size: 18,
                        font: customFont,
                        color: rosa,
                    });
                } else {
                    page.drawText('Espaco CreBortoli', {
                        x: margin,
                        y: height - 40,
                        size: 16,
                        font: helveticaBold,
                        color: rosa,
                    });
                }

                page.drawText('Rua Francisco Martineli, 492 - Palmital | Marilia, SP | (14) 99663.8056', {
                    x: width - margin,
                    y: height - 40,
                    size: 8,
                    font: helveticaFont,
                    color: cinza,
                    align: 'right',
                });

                page.drawLine({
                    start: { x: margin, y: height - 50 },
                    end: { x: width - margin, y: height - 50 },
                    thickness: 1.5,
                    color: rosa,
                });

                let y = height - 70;

                if (customFont) {
                    page.drawText('Documento de Indicacao Terapeutica', {
                        x: width / 2,
                        y: y,
                        size: 11,
                        font: customFont,
                        color: rosa,
                        align: 'center',
                    });
                } else {
                    page.drawText('Documento de Indicacao Terapeutica', {
                        x: width / 2,
                        y: y,
                        size: 10,
                        font: helveticaBold,
                        color: rosa,
                        align: 'center',
                    });
                }
                y -= 25;

                const drawCampo = (label, value) => {
                    page.drawText(label, {
                        x: margin + 10,
                        y: y,
                        size: 9,
                        font: helveticaBold,
                        color: rgb(60/255, 60/255, 60/255),
                    });
                    y -= 15;

                    const lines = String(value).split('\n');
                    for (const line of lines) {
                        page.drawText(line, {
                            x: margin + 14,
                            y: y,
                            size: 10,
                            font: helveticaFont,
                            color: preto,
                        });
                        y -= 14;
                    }
                    y -= 5;
                };

                const drawTitulo = (texto) => {
                    page.drawText(texto.toUpperCase(), {
                        x: margin + 10,
                        y: y,
                        size: 11,
                        font: helveticaBold,
                        color: rosa,
                    });
                    y -= 5;

                    page.drawLine({
                        start: { x: margin, y: y },
                        end: { x: width - margin, y: y },
                        thickness: 0.8,
                        color: rosa,
                    });
                    y -= 20;
                };

                drawTitulo('Identificacao do Paciente');
                drawCampo('Paciente:', paciente);
                drawCampo('Data:', dataFormatada);

                drawTitulo('Indicacao Terapeutica');
                drawCampo('', indicacao);

                if (observacoes && observacoes.trim()) {
                    drawTitulo('Observacoes');
                    drawCampo('', observacoes);
                }

                y -= 20;

                page.drawLine({
                    start: { x: margin + 100, y: y },
                    end: { x: width / 2 - 50, y: y },
                    thickness: 0.3,
                    color: rgb(180/255, 180/255, 190/255),
                });
                page.drawLine({
                    start: { x: width / 2 + 50, y: y },
                    end: { x: width - margin - 100, y: y },
                    thickness: 0.3,
                    color: rgb(180/255, 180/255, 190/255),
                });

                page.drawText('Assinatura do Profissional', {
                    x: width / 2,
                    y: y - 10,
                    size: 8,
                    font: helveticaFont,
                    color: rgb(100/255, 100/255, 100/255),
                    align: 'center',
                });

                page.drawText(`Gerado em: ${new Date().toLocaleString('pt-BR')}`, {
                    x: width / 2,
                    y: 20,
                    size: 7,
                    font: helveticaFont,
                    color: rgb(150/255, 150/255, 150/255),
                    align: 'center',
                });

                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const nomeArquivo = `receituario-${paciente.replace(/\s+/g, '-').toLowerCase()}-${dataInput}.pdf`;
                a.download = nomeArquivo;
                a.click();
                URL.revokeObjectURL(url);

                await saveReceita({
                    paciente: paciente,
                    data: dataInput,
                    dataFormatada: dataFormatada,
                    indicacao: indicacao,
                    observacoes: observacoes,
                    nomeArquivo: nomeArquivo
                });

                renderHistorico();
                alert('Receita gerada com sucesso!');
            } catch (err) {
                console.error('Erro ao gerar PDF:', err);
                alert('Erro ao gerar PDF: ' + err.message);
            }
        }
    </script>
</body>
</html>
