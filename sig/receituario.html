<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cre Bortoli - Receituário</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <script>var v='1.0.0';document.write('<link rel="stylesheet" href="../static/css/style.css?v='+v+'">');</script>
    <style>
        @font-face {
            font-family: 'World of Water';
            src: url('/static/fonts/World_Discovery_Five_PERSONAL_Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        .receituario-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .receituario-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .receituario-header h1 {
            color: #e91e63;
            margin-bottom: 0.5rem;
        }
        .form-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #333;
        }
        .form-group input, 
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }
        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
        }
        .btn-primary {
            background: #e91e63;
            color: white;
        }
        .btn-primary:hover {
            background: #c2185b;
        }
        .btn-secondary {
            background: #666;
            color: white;
        }
        .btn-secondary:hover {
            background: #444;
        }
        .historico-section {
            margin-top: 2rem;
        }
        .historico-section h2 {
            color: #e91e63;
            margin-bottom: 1rem;
        }
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f5f5f5;
            font-weight: 600;
            color: #333;
        }
        tr:hover {
            background: #fafafa;
        }
        .btn-download {
            background: #e91e63;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.875rem;
        }
        .btn-download:hover {
            background: #c2185b;
        }
        .empty-message {
            text-align: center;
            color: #666;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="receituario-container">
            <div class="receituario-header">
                <h1>Receituário</h1>
                <p>Crie indicationes terapéuticas para seus clientes</p>
            </div>

            <div class="form-card">
                <form id="receituarioForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="paciente">Nome do Paciente</label>
                            <input type="text" id="paciente" name="paciente" required placeholder="Digite o nome do paciente">
                        </div>
                        <div class="form-group">
                            <label for="data">Data</label>
                            <input type="date" id="data" name="data" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="indicacao">Indicação Terapêutica</label>
                        <textarea id="indicacao" name="indicacao" required placeholder="Descreva as indicações terapêuticas..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="observacoes">Observações (opcional)</label>
                        <textarea id="observacoes" name="observacoes" placeholder="Observações adicionais..."></textarea>
                    </div>

                    <div class="btn-group">
                        <button type="button" class="btn btn-primary" onclick="gerarPDF()"> Gerar PDF</button>
                        <button type="button" class="btn btn-secondary" onclick="limparForm()">Limpar</button>
                    </div>
                </form>
            </div>

            <div class="historico-section">
                <h2>Receitas Geradas</h2>
                <div class="table-container">
                    <table id="historicoTable">
                        <thead>
                            <tr>
                                <th>Nome da Receita</th>
                                <th>Data</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="historicoBody">
                            <tr>
                                <td colspan="3" class="empty-message">Nenhuma receita gerada ainda.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script type="module">import '../static/js/pocketbase-api.js';</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>var v='1.0.0';document.write('<script src="../static/js/components.js?v='+v+'"><\/script>');document.write('<script src="../static/js/auth-guard.js?v='+v+'"><\/script>');</script>
    <script>
        document.getElementById('data').valueAsDate = new Date();
        
        const RECEITAS_KEY = 'crebortoli_receitas';
        
        function getReceitas() {
            const data = localStorage.getItem(RECEITAS_KEY);
            return data ? JSON.parse(data) : [];
        }
        
        function saveReceitaLocal(receita) {
            const receitas = getReceitas();
            receitas.unshift(receita);
            localStorage.setItem(RECEITAS_KEY, JSON.stringify(receitas));
        }
        
        function deleteReceitaLocal(id) {
            let receitas = getReceitas();
            receitas = receitas.filter(r => r.id !== id);
            localStorage.setItem(RECEITAS_KEY, JSON.stringify(receitas));
        }
        
        async function syncReceitasToServer() {
            if (typeof pb === 'undefined') return;
            try {
                const locais = getReceitas();
                for (const r of locais) {
                    if (!r.synced) {
                        await pb.collection('receitas').create({
                            paciente: r.paciente,
                            data: r.data,
                            dataFormatada: r.dataFormatada,
                            pdfData: r.pdfData,
                            nomeArquivo: r.nomeArquivo,
                            localId: r.id
                        });
                        r.synced = true;
                    }
                }
                localStorage.setItem(RECEITAS_KEY, JSON.stringify(locais));
            } catch (e) {
                console.warn('Erro ao sincronizar com servidor:', e);
            }
        }
        
        async function syncReceitasFromServer() {
            if (typeof pb === 'undefined') return;
            try {
                const remotos = await pb.collection('receitas').getFullList({ sort: '-created' });
                const locais = getReceitas();
                const localIds = new Set(locais.map(r => r.localId || r.id));
                
                remotos.forEach(r => {
                    if (!localIds.has(r.id)) {
                        locais.unshift({
                            id: r.id,
                            localId: r.id,
                            paciente: r.paciente,
                            data: r.data,
                            dataFormatada: r.dataFormatada,
                            pdfData: r.pdfData,
                            nomeArquivo: r.nomeArquivo,
                            synced: true
                        });
                    }
                });
                
                localStorage.setItem(RECEITAS_KEY, JSON.stringify(locais));
            } catch (e) {
                console.warn('Erro ao buscar receitas do servidor:', e);
            }
        }
        
        function renderHistorico() {
            const receitas = getReceitas();
            const tbody = document.getElementById('historicoBody');
            
            if (receitas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="empty-message">Nenhuma receita gerada ainda.</td></tr>';
                return;
            }
            
            tbody.innerHTML = receitas.map(r => `
                <tr>
                    <td>${r.paciente}</td>
                    <td>${r.dataFormatada}</td>
                    <td>
                        <button class="btn-download" onclick="downloadPDF('${r.id}')">Download</button>
                        <button class="btn-download" style="background:#666" onclick="excluirReceita('${r.id}')">Excluir</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function downloadPDF(id) {
            const receitas = getReceitas();
            const receita = receitas.find(r => r.id === id);
            if (receita && receita.pdfData) {
                const blob = base64ToBlob(receita.pdfData, 'application/pdf');
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = receita.nomeArquivo;
                a.click();
                URL.revokeObjectURL(url);
            }
        }
        
        function excluirReceita(id) {
            if (confirm('Deseja excluir esta receita?')) {
                deleteReceitaLocal(id);
                if (typeof pb !== 'undefined') {
                    pb.collection('receitas').delete(id).catch(() => {});
                }
                renderHistorico();
            }
        }
        
        function base64ToBlob(base64, mimeType) {
            const byteCharacters = atob(base64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            return new Blob([byteArray], { type: mimeType });
        }
        
        (async () => {
            await syncReceitasFromServer();
            renderHistorico();
            setInterval(syncReceitasToServer, 30000);
        })();

        function limparForm() {
            document.getElementById('receituarioForm').reset();
            document.getElementById('data').valueAsDate = new Date();
        }

        async function gerarPDF() {
            const paciente = document.getElementById('paciente').value;
            const data = document.getElementById('data').value;
            const indicacao = document.getElementById('indicacao').value;
            const observacoes = document.getElementById('observacoes').value;

            if (!paciente || !data || !indicacao) {
                alert('Por favor, preencha todos os campos obrigatórios.');
                return;
            }

            if (!window.jspdf) {
                alert('Biblioteca jsPDF não carregou. Aguarde um momento e tente novamente.');
                return;
            }

            try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const fontBase64 = await fetch('../static/fonts/World_Discovery_Five_PERSONAL_Regular.otf')
                .then(r => r.arrayBuffer())
                .then(buf => btoa(String.fromCharCode(...new Uint8Array(buf))));
            doc.addFileToVFS('WorldDiscovery.ttf', fontBase64);
            doc.addFont('WorldDiscovery.ttf', 'WorldDiscovery', 'normal');
            doc.setFont('WorldDiscovery');
            
            const dataFormatada = new Date(data).toLocaleDateString('pt-BR');
            
            doc.setDrawColor(128, 0, 128);
            doc.setLineWidth(1.5);
            doc.rect(10, 10, 190, 277);
            
            doc.setDrawColor(138, 43, 226);
            doc.setLineWidth(0.8);
            doc.rect(14, 14, 182, 269);
            
            doc.setDrawColor(186, 85, 211);
            doc.setLineWidth(0.3);
            doc.rect(18, 18, 174, 261);
            
            doc.setLineWidth(0.5);
            doc.rect(20, 20, 170, 40);
            
            doc.setFontSize(20);
            doc.setTextColor(128, 0, 128);
            doc.text('Espaço Cre Bortoli', 105, 30, { align: 'center' });
            
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(10);
            doc.setTextColor(60, 60, 60);
            doc.text('Estética & Depilação', 30, 40);
            doc.text('Rua Francisco Martineli, 492 - Palmital, Marília, SP | (14) 99663.8056', 190, 40, { align: 'right' });
            
            doc.setDrawColor(186, 85, 211);
            doc.setLineWidth(0.5);
            doc.line(25, 58, 195, 58);
            
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(16);
            doc.setTextColor(128, 0, 128);
            doc.text('INDICAÇÃO TERAPÊUTICA', 105, 70, { align: 'center' });
            
            doc.setDrawColor(147, 112, 219);
            doc.setLineWidth(0.3);
            doc.line(60, 75, 150, 75);
            
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(12);
            doc.setTextColor(0, 0, 0);
            doc.text('Paciente:', 25, 90);
            doc.setFont('helvetica', 'normal');
            doc.text(paciente, 55, 90);
            
            doc.setFont('helvetica', 'bold');
            doc.text('Data:', 140, 90);
            doc.setFont('helvetica', 'normal');
            doc.text(dataFormatada, 158, 90);
            
            doc.setDrawColor(200, 200, 200);
            doc.setLineWidth(0.1);
            doc.line(25, 97, 195, 97);
            
            const splitIndicacao = doc.splitTextToSize(indicacao, 170);
            doc.text(splitIndicacao, 25, 110);
            
            let yPos = 110 + (splitIndicacao.length * 7) + 15;
            
            if (observacoes) {
                if (yPos > 230) {
                    doc.addPage();
                    yPos = 30;
                }
                
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(12);
                doc.text('Observações:', 20, yPos);
                
                doc.setFont('helvetica', 'normal');
                const splitObs = doc.splitTextToSize(observacoes, 170);
                doc.text(splitObs, 20, yPos + 7);
            }
            
            const nomeArquivo = `receituario-${paciente.replace(/\s+/g, '-').toLowerCase()}-${data}.pdf`;
            const pdfData = doc.output('datauristring').split(',')[1];
            
            doc.save(nomeArquivo);
            
            saveReceitaLocal({
                id: Date.now().toString(),
                paciente: paciente,
                data: data,
                dataFormatada: dataFormatada,
                pdfData: pdfData,
                nomeArquivo: nomeArquivo,
                synced: false
            });
            
            renderHistorico();
            
            syncReceitasToServer();
            
            alert('Receita gerada com sucesso!');

            } catch (err) {
                console.error('Erro ao gerar PDF:', err);
                alert('Erro ao gerar PDF: ' + err.message);
                return;
            }
        }
    </script>
</body>
</html>
