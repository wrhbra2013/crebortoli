<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cre Bortoli - Receituário</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <script>var v='1.0.0';document.write('<link rel="stylesheet" href="../static/css/style.css?v='+v+'">');</script>
    <style>
        @font-face {
            font-family: 'World of Water';
            src: url('/static/fonts/World_Discovery_Five_PERSONAL_Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        .clinic-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: #fff;
            border-bottom: 2px solid #e91e63;
            margin-bottom: 1rem;
        }
        .clinic-logo {
            font-family: 'World of Water', cursive;
            font-size: 1.8rem;
            color: #e91e63;
        }
        .clinic-tagline {
            font-size: 0.85rem;
            color: #666;
            margin-top: 0.25rem;
        }
        .clinic-address {
            font-size: 0.8rem;
            color: #666;
            text-align: right;
        }
        .receituario-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .receituario-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .receituario-header h1 {
            color: #e91e63;
            margin-bottom: 0.5rem;
        }
        .form-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #333;
        }
        .form-group input, 
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }
        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
        }
        .btn-primary {
            background: #e91e63;
            color: white;
        }
        .btn-primary:hover {
            background: #c2185b;
        }
        .btn-secondary {
            background: #666;
            color: white;
        }
        .btn-secondary:hover {
            background: #444;
        }
        .historico-section {
            margin-top: 2rem;
        }
        .historico-section h2 {
            color: #e91e63;
            margin-bottom: 1rem;
        }
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f5f5f5;
            font-weight: 600;
            color: #333;
        }
        tr:hover {
            background: #fafafa;
        }
        .btn-download {
            background: #e91e63;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.875rem;
        }
        .btn-download:hover {
            background: #c2185b;
        }
        .empty-message {
            text-align: center;
            color: #666;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="clinic-header">
        <div>
            <div class="clinic-logo">Espaço Cre Bortoli</div>
            <div class="clinic-tagline">Estética & Depilação</div>
        </div>
        <div class="clinic-address">
            Rua Francisco Martineli, 492 - Palmital<br>
            Marília, SP | (14) 99663.8056
        </div>
    </div>

    <main>
        <div class="receituario-container">
            <div class="receituario-header">
                <h1>Receituário</h1>
                <p>Crie indicationes terapéuticas para seus clientes</p>
            </div>

            <div class="form-card">
                <form id="receituarioForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="paciente">Nome do Paciente</label>
                            <input type="text" id="paciente" name="paciente" required placeholder="Digite o nome do paciente">
                        </div>
                        <div class="form-group">
                            <label for="data">Data</label>
                            <input type="date" id="data" name="data" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="indicacao">Indicação Terapêutica</label>
                        <textarea id="indicacao" name="indicacao" required placeholder="Descreva as indicações terapêuticas..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="observacoes">Observações (opcional)</label>
                        <textarea id="observacoes" name="observacoes" placeholder="Observações adicionais..."></textarea>
                    </div>

                    <div class="btn-group">
                        <button type="button" class="btn btn-primary" onclick="gerarPDF()"> Gerar PDF</button>
                        <button type="button" class="btn btn-secondary" onclick="limparForm()">Limpar</button>
                    </div>
                </form>
            </div>

            <div class="historico-section">
                <h2>Receitas Geradas</h2>
                <div class="table-container">
                    <table id="historicoTable">
                        <thead>
                            <tr>
                                <th>Nome da Receita</th>
                                <th>Data</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="historicoBody">
                            <tr>
                                <td colspan="3" class="empty-message">Nenhuma receita gerada ainda.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
    <script type="module">
        import { receitas } from '../static/js/pb-db.js';
        window.receitas = receitas;
    </script>
    <script>var v='1.0.0';document.write('<script src="../static/js/components.js?v='+v+'"><\/script>');document.write('<script src="../static/js/auth-guard.js?v='+v+'"><\/script>');</script>
    <script>
        document.getElementById('data').valueAsDate = new Date();
        
        async function getReceitas() {
            return await receitas.getAll();
        }
        
        async function saveReceita(receita) {
            return await receitas.create(receita);
        }
        
        async function deleteReceita(id) {
            return await receitas.delete(id);
        }
        
        async function renderHistorico() {
            const receitas = await getReceitas();
            const tbody = document.getElementById('historicoBody');
            
            if (receitas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="empty-message">Nenhuma receita gerada ainda.</td></tr>';
                return;
            }
            
            tbody.innerHTML = receitas.map(r => `
                <tr>
                    <td>${r.paciente}</td>
                    <td>${r.dataFormatada}</td>
                    <td>
                        <button class="btn-download" onclick="downloadPDF('${r.id}')">Download</button>
                        <button class="btn-download" style="background:#666" onclick="excluirReceita('${r.id}')">Excluir</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function downloadPDF(id) {
            getReceitas().then(receitas => {
                const receita = receitas.find(r => r.id === id);
                if (receita && receita.pdfData) {
                    const blob = base64ToBlob(receita.pdfData, 'application/pdf');
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = receita.nomeArquivo;
                    a.click();
                    URL.revokeObjectURL(url);
                }
            });
        }
        
        async function excluirReceita(id) {
            if (confirm('Deseja excluir esta receita?')) {
                await deleteReceita(id);
                await renderHistorico();
            }
        }
        
        function base64ToBlob(base64, mimeType) {
            const byteCharacters = atob(base64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            return new Blob([byteArray], { type: mimeType });
        }

        (async () => {
            await renderHistorico();
        })();
        
        function limparForm() {
            document.getElementById('receituarioForm').reset();
            document.getElementById('data').valueAsDate = new Date();
        }

        async function gerarPDF() {
            const paciente = document.getElementById('paciente').value;
            const data = document.getElementById('data').value;
            const indicacao = document.getElementById('indicacao').value;
            const observacoes = document.getElementById('observacoes').value;

            if (!paciente || !data || !indicacao) {
                alert('Por favor, preencha todos os campos obrigatórios.');
                return;
            }

            if (!window.pdfMake) {
                alert('Biblioteca pdfMake não carregou. Aguarde um momento e tente novamente.');
                return;
            }

            try {
                const dataFormatada = new Date(data).toLocaleDateString('pt-BR');

                const docDefinition = {
                    defaultStyle: {
                        font: 'WorldWater'
                    },
                    fonts: {
                        WorldWater: {
                            normal: 'static/fonts/World_Discovery_Five_PERSONAL_Regular.otf'
                        }
                    },
                    header: {
                        stack: [
                            {
                                columns: [
                                    {
                                        width: 80,
                                        image: 'static/css/image/crebortoli.png',
                                        width: 70
                                    },
                                    {
                                        width: '*',
                                        stack: [
                                            { text: 'Espaço Cre Bortoli', fontSize: 20, color: '#e91e63', font: 'WorldWater' },
                                            { text: 'Estética & Depilação', fontSize: 10, color: '#666', margin: [0, 2, 0, 0] }
                                        ],
                                        margin: [10, 0, 0, 0]
                                    },
                                    {
                                        width: '*',
                                        text: 'Rua Francisco Martineli, 492 - Palmital\nMarília, SP | (14) 99663.8056',
                                        fontSize: 9,
                                        color: '#666',
                                        alignment: 'right'
                                    }
                                ],
                                margin: [20, 10, 20, 10]
                            },
                            { canvas: [{ type: 'line', x1: 0, y1: 0, x2: 595, y2: 0, lineWidth: 2, lineColor: '#e91e63' }], margin: [0, 0, 0, 5] }
                        ]
                    },
                    content: [
                            text: 'INDICAÇÃO TERAPÊUTICA',
                            fontSize: 16,
                            bold: true,
                            color: '#800080',
                            alignment: 'center',
                            margin: [0, 10, 0, 3]
                        },
                        {
                            canvas: [{ type: 'line', x1: 60, y1: 0, x2: 150, y2: 0, lineWidth: 0.3, lineColor: '#9370db' }],
                            margin: [0, 0, 0, 15]
                        },
                        { columns: [{ text: 'Paciente: ', bold: true }, { text: paciente }] },
                        { columns: [{ text: 'Data: ', bold: true }, { text: dataFormatada }], margin: [0, 5, 0, 10] },
                        { text: indicacao, lineHeight: 1.5 }
                    ],
                    pageSize: 'A4',
                    pageMargins: [20, 20, 20, 20]
                };

                if (observacoes) {
                    docDefinition.content.push({ text: 'Observações:', bold: true, margin: [0, 15, 0, 5] });
                    docDefinition.content.push({ text: observacoes, lineHeight: 1.5 });
                }

                const nomeArquivo = `receituario-${paciente.replace(/\s+/g, '-').toLowerCase()}-${data}.pdf`;

                pdfMake.createPdf(docDefinition).download(nomeArquivo);

                await saveReceita({
                    paciente: paciente,
                    data: data,
                    dataFormatada: dataFormatada,
                    nomeArquivo: nomeArquivo
                });

                await renderHistorico();

                alert('Receita gerada com sucesso!');

            } catch (err) {
                console.error('Erro ao gerar PDF:', err);
                alert('Erro ao gerar PDF: ' + err.message);
            }
        }
    </script>
</body>
</html>
