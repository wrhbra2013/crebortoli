<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cre Bortoli - Receituário</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <script>var v='1.0.0';document.write('<link rel="stylesheet" href="../static/css/style.css?v='+v+'">');</script>
    <style>
        
        .clinic-header {
            display: none;
        }
        .receituario-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .receituario-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .receituario-header h1 {
            color: #e91e63;
            margin-bottom: 0.5rem;
        }
        .form-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #333;
        }
        .form-group input, 
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }
        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
        }
        .btn-primary {
            background: #e91e63;
            color: white;
        }
        .btn-primary:hover {
            background: #c2185b;
        }
        .btn-secondary {
            background: #666;
            color: white;
        }
        .btn-secondary:hover {
            background: #444;
        }
        .historico-section {
            margin-top: 2rem;
        }
        .historico-section h2 {
            color: #e91e63;
            margin-bottom: 1rem;
        }
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f5f5f5;
            font-weight: 600;
            color: #333;
        }
        tr:hover {
            background: #fafafa;
        }
        .btn-download {
            background: #e91e63;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.875rem;
        }
        .btn-download:hover {
            background: #c2185b;
        }
        .empty-message {
            text-align: center;
            color: #666;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="clinic-header">
        <div>
            <div class="clinic-logo">Espaço Cre Bortoli</div>
            <div class="clinic-tagline">Estética & Depilação</div>
        </div>
        <div class="clinic-address">
            Rua Francisco Martineli, 492 - Palmital<br>
            Marília, SP | (14) 99663.8056
        </div>
    </div>

    <main>
        <div class="receituario-container">
            <div class="receituario-header">
                <h1>Receituário</h1>
                <p>Crie indicações terapêuticas para seus clientes</p>
            </div>

            <div class="form-card">
                <form id="receituarioForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="paciente">Nome do Paciente</label>
                            <input type="text" id="paciente" name="paciente" required placeholder="Digite o nome do paciente">
                        </div>
                        <div class="form-group">
                            <label for="data">Data</label>
                            <input type="date" id="data" name="data" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="indicacao">Indicação Terapêutica</label>
                        <textarea id="indicacao" name="indicacao" required placeholder="Descreva as indicações terapêuticas..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="observacoes">Observações (opcional)</label>
                        <textarea id="observacoes" name="observacoes" placeholder="Observações adicionais..."></textarea>
                    </div>

                    <div class="btn-group">
                        <button type="button" class="btn btn-primary" onclick="gerarPDF()"> Gerar PDF</button>
                        <button type="button" class="btn btn-secondary" onclick="limparForm()">Limpar</button>
                    </div>
                </form>
            </div>

            <div class="historico-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h2>Receitas Geradas</h2>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn-download" style="background:#ff9800;" onclick="setupJSONBin()">Configurar Sync</button>
                        <button class="btn-download" style="background:#9c27b0;" onclick="mostrarStatusSync()">Status Sync</button>
                        <button class="btn-download" onclick="exportarReceitas()">Exportar</button>
                        <label class="btn-download" style="background:#2196f3; cursor: pointer;">
                            Importar
                            <input type="file" accept=".json" onchange="importarReceitas(event)" style="display: none;">
                        </label>
                    </div>
                </div>
                <div class="table-container">
                    <table id="historicoTable">
                        <thead>
                            <tr>
                                <th>Nome da Receita</th>
                                <th>Data</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="historicoBody">
                            <tr>
                                <td colspan="3" class="empty-message">Nenhuma receita gerada ainda.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>var v='1.0.0';document.write('<script src="../static/js/components.js?v='+v+'"><\/script>');document.write('<script src="../static/js/storage.js?v='+v+'"><\/script>');document.write('<script src="../static/js/auth-guard.js?v='+v+'"><\/script>');</script>
    <script>
        document.getElementById('data').valueAsDate = new Date();
        
        const SHEETS_URL = localStorage.getItem('sheets_url') || '';
        
        function getReceitas() {
            return ReceitasStore.getAll();
        }
        
        async function syncFromServer() {
            if (!SHEETS_URL) return getReceitas();
            try {
                const response = await fetch(SHEETS_URL + '?action=read');
                if (response.ok) {
                    const result = await response.json();
                    if (result && Array.isArray(result)) {
                        localStorage.setItem('receitas', JSON.stringify(result));
                        return result;
                    }
                }
            } catch (err) {
                console.error('Erro ao buscar do servidor:', err);
            }
            return getReceitas();
        }
        
        async function syncToServer() {
            if (!SHEETS_URL) return;
            try {
                const receitas = getReceitas();
                await fetch(SHEETS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'write', data: receitas })
                });
                console.log('Backup automático realizado!');
            } catch (err) {
                console.error('Erro no backup:', err);
            }
        }
        
        function saveReceita(receita) {
            const receitas = getReceitas();
            receita.id = Date.now().toString();
            receitas.unshift(receita);
            localStorage.setItem('receitas', JSON.stringify(receitas));
            syncToServer();
            return receita;
        }
        
        function deleteReceita(id) {
            let receitas = getReceitas();
            receitas = receitas.filter(r => r.id !== id);
            localStorage.setItem('receitas', JSON.stringify(receitas));
            syncToServer();
        }
        
        function exportarReceitas() {
            const receitas = getReceitas();
            if (receitas.length === 0) {
                alert('Não há receitas para exportar.');
                return;
            }
            const blob = new Blob([JSON.stringify(receitas, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `receitas-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            syncToServer();
        }
        
        function setupJSONBin() {
            const binId = prompt('Cole o BIN ID do JSONBin.io:');
            const apiKey = prompt('Cole a API Key do JSONBin.io:');
            if (binId && apiKey) {
                localStorage.setItem('jsonbin_id', binId);
                localStorage.setItem('jsonbin_key', apiKey);
                location.reload();
            }
        }
        
        function mostrarStatusSync() {
            if (JSONBIN_URL) {
                alert('✅ Backup automático ATIVO\n\nBin ID: ' + JSONBIN_BIN_ID);
            } else {
                alert('⚠️ Backup automático NÃO configurado.\n\nClique em "Configurar Sync" para ativar.');
            }
        }
        
        function importarReceitas(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const receitas = JSON.parse(e.target.result);
                    if (Array.isArray(receitas)) {
                        localStorage.setItem('receitas', JSON.stringify(receitas));
                        renderHistorico();
                        alert(`Importadas ${receitas.length} receitas com sucesso!`);
                    } else {
                        alert('Formato de arquivo inválido.');
                    }
                } catch (err) {
                    alert('Erro ao ler arquivo: ' + err.message);
                }
            };
            reader.readAsText(file);
        }
        
        async function renderHistorico() {
            try {
                const listaReceitas = getReceitas();
                const tbody = document.getElementById('historicoBody');
                
                if (!listaReceitas || listaReceitas.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="empty-message">Nenhuma receita gerada ainda.</td></tr>';
                    return;
                }
                
                tbody.innerHTML = listaReceitas.map(r => `
                    <tr>
                        <td>${r.paciente}</td>
                        <td>${r.dataFormatada}</td>
                        <td>
                            <button class="btn-download" onclick="downloadPDF('${r.id}')">Download</button>
                            <button class="btn-download" style="background:#666" onclick="excluirReceita('${r.id}')">Excluir</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('Erro ao buscar receitas:', err);
                document.getElementById('historicoBody').innerHTML = '<tr><td colspan="3" class="empty-message">Erro ao carregar receitas.</td></tr>';
            }
        }
        
        window.downloadPDF = function(id) {
            const listaReceitas = getReceitas();
            const receita = listaReceitas.find(r => r.id === id);
            if (receita) {
                alert('PDF será baixado novamente.');
            }
        };
        
        window.excluirReceita = function(id) {
            if (confirm('Deseja excluir esta receita?')) {
                deleteReceita(id);
                renderHistorico();
            }
        };
        
        window.exportarReceitas = exportarReceitas;
        window.importarReceitas = importarReceitas;
        window.setupJSONBin = setupJSONBin;
        window.mostrarStatusSync = mostrarStatusSync;
        
        function base64ToBlob(base64, mimeType) {
            const byteCharacters = atob(base64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            return new Blob([byteArray], { type: mimeType });
        }
        
        (async () => {
            await syncFromServer();
            renderHistorico();
        })();
        
        window.limparForm = function() {
            document.getElementById('receituarioForm').reset();
            document.getElementById('data').valueAsDate = new Date();
        };

        function criarHeaderPDF() {
            return function(currentPage, pageCount, pageSize) {
                return {
                    stack: [
                        {
                            columns: [
                                {
                                    width: '*',
                                    stack: [
                                        { text: 'Espaço Cre Bortoli', fontSize: 22, color: '#e91e63', bold: true, font: 'WorldOfWater' },
                                        { text: 'Estética & Depilação', fontSize: 9, color: '#666', margin: [0, 2, 0, 0] }
                                    ]
                                },
                                {
                                    width: '*',
                                    text: 'Rua Francisco Martineli, 492 - Palmital\nMarília, SP | (14) 99663.8056',
                                    fontSize: 9,
                                    color: '#666',
                                    alignment: 'right'
                                }
                            ]
                        },
                        {
                            canvas: [{ type: 'line', x1: 0, y1: 5, x2: 555, y2: 5, lineWidth: 2, lineColor: '#e91e63' }],
                            margin: [0, 10, 0, 0]
                        }
                    ],
                    margin: [20, 20, 20, 10]
                };
            };
        }

function gerarPDF() {
            try {
                const { jsPDF } = window.jspdf;
                if (!jsPDF) {
                    alert('Biblioteca jsPDF não carregou.');
                    return;
                }

                const headerEl = document.querySelector('.clinic-header');
                headerEl.classList.add('print');
                const logo = headerEl.querySelector('.clinic-logo')?.textContent || 'Espaço Cre Bortoli';
                const tagline = headerEl.querySelector('.clinic-tagline')?.textContent || 'Estética & Depilação';
                const address = headerEl.querySelector('.clinic-address')?.textContent || 'Rua Francisco Martineli, 492 - Palmital - Marília, SP | (14) 99663.8056';
                headerEl.classList.remove('print');

                const paciente = document.getElementById('paciente').value;
                const data = document.getElementById('data').value;
                const indicacao = document.getElementById('indicacao').value;
                const observacoes = document.getElementById('observacoes').value;

                if (!paciente || !data || !indicacao) {
                    alert('Por favor, preencha todos os campos obrigatórios.');
                    return;
                }

                const doc = new jsPDF();
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                const margin = 20;
                let y = margin;

                // Header com logo em imagem gerada do canvas usando fonte local
                const fontUrl = '/static/fonts/World_Discovery_Five_PERSONAL_Regular.otf';
                const fontFace = new FontFace('WorldOfWater', `url(${fontUrl})`);
                await fontFace.load();
                document.fonts.add(fontFace);
                
                const canvas = document.createElement('canvas');
                canvas.width = 130;
                canvas.height = 28;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = 'transparent';
                ctx.clearRect(0, 0, 130, 28);
                
                // Logo com fonte local (menor para caber)
                ctx.font = '12px WorldOfWater';
                ctx.fillStyle = '#e91e63';
                ctx.fillText(logo, 2, 16);
                
                // Tagline menor
                ctx.font = 'italic 5px sans-serif';
                ctx.fillStyle = '#666666';
                ctx.fillText(tagline, 2, 24);
                
                const logoDataUrl = canvas.toDataURL('image/png');
                doc.addImage(logoDataUrl, 'PNG', margin, y, 35, 8);
                
                // Endereço (direita)
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(7);
                doc.setTextColor(60, 60, 60);
                const addressLines = address.split('\n');
                let addrY = y + 3;
                addressLines.forEach(line => {
                    doc.text(line, pageWidth - margin, addrY, { align: 'right' });
                    addrY += 4;
                });
                
                doc.setDrawColor(233, 30, 99);
                doc.setLineWidth(1.5);
                doc.line(margin, y, pageWidth - margin, y);
                y += 12;

                const dataFormatada = new Date(data).toLocaleDateString('pt-BR');

                doc.setFontSize(14);
                doc.setTextColor(128, 0, 128);
                doc.text('INDICAÇÃO TERAPÊUTICA', pageWidth / 2, y, { align: 'center' });
                y += 8;
                doc.setDrawColor(147, 112, 219);
                doc.setLineWidth(0.5);
                doc.line(70, y, pageWidth - 70, y);
                y += 12;

                // Box paciente
                doc.setFillColor(250, 250, 252);
                doc.rect(20, y, pageWidth - 40, 25, 'F');
                
                doc.setFontSize(11);
                doc.setTextColor(60, 60, 60);
                doc.text('Paciente:', 25, y + 10);
                doc.setFontSize(13);
                doc.setTextColor(0, 0, 0);
                doc.text(paciente, 60, y + 10);
                
                doc.setFontSize(11);
                doc.setTextColor(60, 60, 60);
                doc.text('Data:', 25, y + 20);
                doc.setFontSize(12);
                doc.setTextColor(0, 0, 0);
                doc.text(dataFormatada, 50, y + 20);
                
                y += 35;

                const lines = doc.splitTextToSize(indicacao, pageWidth - 40);
                doc.setFontSize(11);
                doc.setTextColor(0, 0, 0);
                doc.text(lines, 20, y);
                y += lines.length * 5 + 15;

                if (observacoes && observacoes.trim()) {
                    doc.setFontSize(10);
                    doc.setTextColor(60, 60, 60);
                    doc.text('Observações:', 20, y);
                    y += 5;
                    const obsLines = doc.splitTextToSize(observacoes, pageWidth - 40);
                    doc.setTextColor(0, 0, 0);
                    doc.text(obsLines, 20, y);
                }

                const nomeArquivo = `receituario-${paciente.replace(/\s+/g, '-').toLowerCase()}-${data}.pdf`;
                doc.save(nomeArquivo);

                saveReceita({
                    paciente: paciente,
                    data: data,
                    dataFormatada: dataFormatada,
                    nomeArquivo: nomeArquivo
                });

                renderHistorico();

                alert('Receita gerada com sucesso!');
            } catch (err) {
                console.error('Erro ao gerar PDF:', err);
                alert('Erro ao gerar PDF: ' + err.message);
            }
        }
    </script>
</body>
</html>
