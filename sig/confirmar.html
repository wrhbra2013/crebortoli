<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Login - SIG Cre Bortoli</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <link rel="stylesheet" href="../static/css/style2.css">
    <style>
        :root {
            --cor-principal: #8a4baf;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f7f8fc 0%, #e8eaf6 100%);
            padding: 1rem;
        }
        .confirmar-container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(108, 99, 255, 0.15);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo h1 {
            color: var(--cor-principal);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .codigo-exibido {
            background: #e8eaf6;
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }
        .codigo-exibido .label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 0.5rem;
        }
        .codigo-exibido .codigo {
            font-family: 'Courier New', monospace;
            font-size: 2rem;
            font-weight: bold;
            color: var(--cor-principal);
            letter-spacing: 4px;
        }
        .input-container {
            margin-bottom: 1.5rem;
        }
        .input-container label {
            display: block;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.5rem;
            text-align: left;
        }
        .input-container input {
            width: 100%;
            padding: 1rem;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            text-align: center;
            letter-spacing: 4px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-transform: uppercase;
            box-sizing: border-box;
        }
        .input-container input:focus {
            outline: none;
            border-color: var(--cor-principal);
        }
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 0.8rem;
            transition: all 0.3s;
        }
        .btn-confirmar {
            background: #28a745;
            color: white;
        }
        .btn-confirmar:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
        }
        .btn-confirmar:disabled {
            background: #95c9a8;
            cursor: not-allowed;
            transform: none;
        }
        .btn-cancelar {
            background: #dc3545;
            color: white;
        }
        .btn-cancelar:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
        }
        .status-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: 500;
        }
        .status-message.sucesso {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        .status-message.erro {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        .status-message.info {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
        }
        .info-text {
            font-size: 0.85rem;
            color: #666;
            margin-top: 1rem;
        }
        h2 {
            color: var(--cor-principal);
            margin-bottom: 0.5rem;
        }
        p {
            color: #666;
            margin-bottom: 1.5rem;
        }
        .codigo-invalido {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="confirmar-container">
        <div class="logo">
            <h1>SIG Cre Bortoli</h1>
        </div>
        
        <div id="status-message" class="status-message" style="display: none;"></div>
        
        <div class="icon" id="icon">🔐</div>
        
        <h2 id="titulo">Confirmar Acesso</h2>
        <p id="subtitulo">Digite o código exibido no computador para confirmar o login</p>
        
        <div class="codigo-exibido">
            <div class="label">Código lido do QR Code</div>
            <div class="codigo" id="codigo-lido">-</div>
        </div>
        
        <div class="input-container" id="input-container">
            <label for="codigo-digitado">Digite o código acima para confirmar:</label>
            <input type="text" id="codigo-digitado" maxlength="8" placeholder="________" autocomplete="off">
        </div>
        
        <button class="btn btn-confirmar" id="btn-confirmar" onclick="confirmarLogin()">
            ✓ Confirmar Login
        </button>
        
        <button class="btn btn-cancelar" id="btn-cancelar" onclick="cancelarLogin()">
            ✕ Cancelar
        </button>
        
        <p class="info-text">
            O código deve ser digitado manualmente para confirmar o acesso.
        </p>
    </div>

    <script>
        const BASE_URL = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/sig/'));
        const API_URL = BASE_URL + '/api.php';
        let codigoLido = '';

        function getApiUrl() {
            return API_URL;
        }

        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            codigoLido = urlParams.get('codigo') || '';

            if (!codigoLido) {
                mostrarStatus('Link inválido. Escaneie o QR Code novamente.', 'erro');
                document.getElementById('btn-confirmar').style.display = 'none';
                document.getElementById('btn-cancelar').style.display = 'none';
                document.getElementById('input-container').style.display = 'none';
                document.getElementById('icon').textContent = '❌';
                return;
            }

            document.getElementById('codigo-lido').textContent = codigoLido;
            document.getElementById('codigo-digitado').focus();
        }

        function mostrarStatus(mensagem, tipo) {
            const el = document.getElementById('status-message');
            el.textContent = mensagem;
            el.className = 'status-message ' + tipo;
            el.style.display = 'block';
        }

        function validarCodigo() {
            const digitado = document.getElementById('codigo-digitado').value.toUpperCase().trim();
            return digitado === codigoLido;
        }

        async function confirmarLogin() {
            if (!validarCodigo()) {
                mostrarStatus('Código incorreto. Digite exatamente o código exibido acima.', 'erro');
                document.getElementById('codigo-digitado').value = '';
                document.getElementById('codigo-digitado').focus();
                return;
            }

            const btn = document.getElementById('btn-confirmar');
            btn.disabled = true;
            btn.textContent = 'Confirmando...';

            try {
                const response = await fetch(getApiUrl(), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        acao: 'aprovar_codigo',
                        codigo: codigoLido
                    })
                });

                const data = await response.json();

                if (data.sucesso) {
                    mostrarStatus('Login confirmado!', 'sucesso');
                    document.getElementById('btn-confirmar').style.display = 'none';
                    document.getElementById('btn-cancelar').style.display = 'none';
                    document.getElementById('input-container').style.display = 'none';
                    document.getElementById('icon').textContent = '✓';
                    document.getElementById('titulo').textContent = 'Confirmado!';
                    document.getElementById('subtitulo').textContent = 'O acesso foi liberado no computador.';
                } else {
                    throw new Error(data.erro || 'Erro ao confirmar');
                }
            } catch (e) {
                mostrarStatus(e.message || 'Erro ao confirmar. Tente novamente.', 'erro');
                btn.disabled = false;
                btn.textContent = '✓ Confirmar Login';
            }
        }

        async function cancelarLogin() {
            const btn = document.getElementById('btn-cancelar');
            btn.disabled = true;
            btn.textContent = 'Cancelando...';

            try {
                await fetch(getApiUrl(), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        acao: 'negar_codigo',
                        codigo: codigoLido
                    })
                });
            } catch (e) {
                console.error('Erro ao cancelar:', e);
            }

            mostrarStatus('Login cancelado.', 'info');
            document.getElementById('btn-confirmar').style.display = 'none';
            document.getElementById('btn-cancelar').style.display = 'none';
            document.getElementById('input-container').style.display = 'none';
            document.getElementById('icon').textContent = '✕';
            document.getElementById('titulo').textContent = 'Cancelado';
            document.getElementById('subtitulo').textContent = 'O login foi cancelado.';
        }

        document.getElementById('codigo-digitado').addEventListener('input', function(e) {
            this.value = this.value.toUpperCase();
            mostrarStatus('', '');
        });

        document.getElementById('codigo-digitado').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                confirmarLogin();
            }
        });

        init();
    </script>
</body>
</html>
